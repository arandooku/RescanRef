<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScanRef</title>
<style>
/* ===== CSS Custom Properties ===== */
:root {
  --sidebar-bg: #0e100c;
  --main-bg: #0a0c08;
  --accent-pink: #f92672;
  --accent-green: #a6e22e;
  --accent-cyan: #66d9ef;
  --accent-yellow: #e6db74;
  --accent-purple: #ae81ff;
  --accent-orange: #fd971f;
  --text-primary: #e0e0d8;
  --text-secondary: #8a8c84;
  --text-muted: #4a4c44;
  --code-bg: #0a0c08;
  --card-bg: #0e100c;
  --card-border: #1e201a;
  --input-bg: #0a0c08;
  --input-border: #1e201a;
  --toggle-off-bg: #2a2c24;
  --toggle-on-bg: var(--accent-green);
  --scrollbar-thumb: #2a2c24;
  --scrollbar-track: transparent;
  --mark-bg: rgba(230, 219, 116, 0.2);
  --overlay-bg: rgba(0,0,0,0.8);
  --shadow: none;
  --card-hover-border: #3e403a;
  --sidebar-separator: rgba(255,255,255,0.04);
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'OCR A Extended', 'OCR A Std', Consolas, monospace;
  font-size: 13px;
  background: var(--main-bg);
  color: var(--text-primary);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

mark {
  background: var(--mark-bg);
  color: inherit;
  padding: 1px 3px;
  box-decoration-break: clone;
  -webkit-box-decoration-break: clone;
}


/* ===== Layout ===== */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ===== Sidebar ===== */
.sidebar {
  width: 232px;
  min-width: 232px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  border-right: 1px solid var(--card-border);
  z-index: 100;
  position: relative;
}

.sidebar-header {
  padding: 20px 18px 10px;
  border-bottom: 1px solid var(--sidebar-separator);
}
.sidebar-header h1 {
  font-family: inherit;
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--accent-pink);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.sidebar-header .subtitle {
  font-size: 0.68rem;
  color: var(--text-muted);
  margin-top: 3px;
  letter-spacing: 0.5px;
}

.sidebar-search { padding: 10px 14px 6px; }
.sidebar-search input {
  width: 100%;
  padding: 7px 11px;
  border: 1px solid var(--input-border);
  border-radius: 0;
  background: var(--input-bg);
  color: var(--text-primary);
  font-size: 0.82rem;
  outline: none;
  transition: border-color 0.2s;
}
.sidebar-search input:focus {
  border-color: var(--accent-green);
}
.sidebar-search input::placeholder { color: #3a3c34; }

.sidebar-nav { flex: 1; overflow-y: auto; padding: 6px 0; }

.nav-group-label {
  padding: 14px 18px 5px;
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
  font-weight: 700;
}

.nav-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 18px 7px 26px;
  font-size: 0.82rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
  border-left: 2px solid transparent;
  margin: 1px 0;
}
.nav-item:hover {
  background: rgba(166, 226, 46, 0.06);
  color: var(--text-primary);
  border-left-color: rgba(166, 226, 46, 0.3);
}
.nav-item.active {
  background: linear-gradient(90deg, rgba(166, 226, 46, 0.15) 0%, transparent 100%);
  color: var(--accent-green);
  font-weight: 600;
  border-left-color: var(--accent-green);
}
.nav-item .match-count {
  font-size: 0.65rem;
  font-weight: 700;
  background: rgba(166, 226, 46, 0.15);
  color: var(--accent-green);
  padding: 1px 7px;
  border-radius: 0;
  min-width: 20px;
  text-align: center;
}
.nav-item.active .match-count { background: rgba(166, 226, 46, 0.25); }

/* ===== GitBook-style tree nav ===== */
.nav-tree-parent {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 18px 7px 26px;
  font-size: 0.82rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
  border-left: 2px solid transparent;
  margin: 1px 0;
}
.nav-tree-parent:hover {
  background: rgba(166, 226, 46, 0.06);
  color: var(--text-primary);
  border-left-color: rgba(166, 226, 46, 0.3);
}
.nav-tree-parent.active {
  background: linear-gradient(90deg, rgba(166, 226, 46, 0.15) 0%, transparent 100%);
  color: var(--accent-green);
  font-weight: 600;
  border-left-color: var(--accent-green);
}
.nav-tree-chevron {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  font-size: 0.55rem;
  color: var(--text-muted);
  transition: transform 0.12s cubic-bezier(0.4, 0, 0.2, 1);
  flex-shrink: 0;
  margin-right: 6px;
}
.nav-tree-parent.expanded .nav-tree-chevron {
  transform: rotate(90deg);
}
.nav-tree-parent-label {
  display: flex;
  align-items: center;
  flex: 1;
  min-width: 0;
}
.nav-tree-children {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.15s cubic-bezier(0.4, 0, 0.2, 1);
}
.nav-tree-children.expanded {
  max-height: 600px;
}
.nav-tree-child {
  display: flex;
  align-items: center;
  padding: 5px 18px 5px 44px;
  font-size: 0.75rem;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
  border-left: 2px solid transparent;
  position: relative;
}
.nav-tree-child::before {
  content: '';
  position: absolute;
  left: 33px;
  top: 0;
  bottom: 0;
  width: 1px;
  background: var(--card-border);
}
.nav-tree-child:hover {
  background: rgba(166, 226, 46, 0.04);
  color: var(--text-secondary);
  border-left-color: rgba(166, 226, 46, 0.2);
}
.nav-tree-child.active {
  color: var(--accent-green);
  font-weight: 600;
  border-left-color: var(--accent-green);
  background: rgba(166, 226, 46, 0.08);
}
.nav-tree-child .tree-child-count {
  font-size: 0.6rem;
  color: var(--text-muted);
  margin-left: auto;
  padding-left: 8px;
  opacity: 0.6;
}

.sidebar-footer {
  padding: 14px 18px;
  border-top: 1px solid var(--sidebar-separator);
}


/* ===== Hamburger (mobile) ===== */
.hamburger {
  display: none;
  position: fixed;
  top: 12px; left: 12px;
  z-index: 200;
  background: var(--sidebar-bg);
  border: 1px solid var(--card-border);
  border-radius: 0;
  padding: 8px 10px;
  cursor: pointer;
  color: var(--text-primary);
  font-size: 1.1rem;
  line-height: 1;
  backdrop-filter: blur(8px);
  transition: border-color 0.2s;
}
.hamburger:hover { border-color: var(--accent-green); }
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  z-index: 99;
  backdrop-filter: blur(2px);
}

@media (max-width: 767px) {
  .hamburger { display: block; }
  .sidebar {
    position: fixed;
    left: -270px;
    top: 0; bottom: 0;
    transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .sidebar.open { left: 0; }
  .sidebar-overlay.open { display: block; }
  .main-content { margin-left: 0 !important; }
}

/* ===== Main Content ===== */
.main-content {
  flex: 1;
  overflow-y: auto;
  padding: 28px 36px;
  position: relative;
}

.section-header {
  margin-bottom: 24px;
}
.section-header h2 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--accent-green);
  letter-spacing: 0.5px;
  display: inline-block;
  border: 1px solid rgba(166, 226, 46, 0.3);
  padding: 2px 10px;
}
.section-header p {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-top: 5px;
}
.section-prompt {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-bottom: 4px;
  letter-spacing: 0.5px;
  overflow-x: auto;
  white-space: nowrap;
}
.section-prompt .cmd { color: var(--accent-green); font-weight: 700; }
.section-prompt .flag { color: var(--accent-cyan); }
.section-prompt .arg { color: var(--accent-yellow); }

/* ===== Reference Cards ===== */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 8px;
  align-items: start;
}
@media (max-width: 500px) { .cards-grid { grid-template-columns: 1fr; } }

.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  overflow: hidden;
  transition: border-color 0.15s;
}
.card:hover { border-color: var(--card-hover-border); }

.card-header {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 10px 14px;
  cursor: pointer;
  user-select: none;
}
.card-header-main { flex: 1; min-width: 0; }
.card-chevron {
  font-size: 0.6rem;
  color: var(--text-muted);
  transition: transform 0.12s ease;
  flex-shrink: 0;
  margin-top: 3px;
}
.card.expanded .card-chevron { transform: rotate(90deg); }

.card-title {
  font-size: 0.85rem;
  font-weight: 600;
  margin-bottom: 3px;
}
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.tag-badge {
  font-size: 0.55rem;
  padding: 1px 6px;
  border-radius: 0;
  background: rgba(174, 129, 255, 0.12);
  color: var(--accent-purple);
  font-weight: 600;
  text-transform: lowercase;
  letter-spacing: 0.3px;
}

.card-body {
  display: none;
  padding: 0 14px 12px;
}
.card.expanded .card-body { display: block; }

.code-block-wrapper {
  position: relative;
  margin: 4px 0;
}
.code-block {
  background: var(--code-bg);
  border: 1px solid var(--card-border);
  padding: 8px 40px 8px 12px;
  font-family: inherit;
  font-size: 0.8rem;
  color: var(--accent-green);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.5;
}
.copy-btn {
  position: absolute;
  top: 5px; right: 5px;
  background: transparent;
  border: 1px solid var(--card-border);
  color: var(--text-muted);
  font-size: 0.6rem;
  font-family: inherit;
  padding: 2px 8px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.copy-btn:hover { border-color: var(--accent-green); color: var(--accent-green); }
.copy-btn.copied {
  border-color: var(--accent-green);
  color: var(--accent-green);
  background: rgba(166, 226, 46, 0.08);
}

.card-notes {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-top: 6px;
  line-height: 1.5;
}
.card-doc-link {
  display: inline-block;
  margin-top: 6px;
  font-size: 0.7rem;
  color: var(--accent-cyan);
  text-decoration: none;
  letter-spacing: 0.5px;
}
.card-doc-link:hover {
  text-decoration: underline;
}

/* ===== Craft Section ===== */
.craft-container {
  position: relative;
  z-index: 1;
}
.craft-groups-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
  gap: 8px;
  align-items: start;
  max-width: 1100px;
}

.target-input-wrapper { margin-bottom: 22px; }
.target-input-wrapper label {
  font-size: 0.72rem;
  color: var(--text-muted);
  display: block;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
}
.target-input {
  width: 100%;
  padding: 11px 16px;
  font-family: inherit;
  font-size: 1.05rem;
  background: var(--input-bg);
  color: var(--text-primary);
  border: 2px solid var(--accent-green);
  border-radius: 0;
  outline: none;
  transition: none;
}
.target-input::placeholder { color: #3a3c34; }
.target-input:focus {
}

/* ===== Multi-Target Input ===== */
.target-mode-toggle {
  display: inline-flex;
  gap: 0;
  margin-left: 10px;
  font-size: 0.7rem;
}
.target-mode-toggle button {
  background: transparent;
  border: 1px solid var(--card-border);
  color: var(--text-muted);
  padding: 1px 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.7rem;
}
.target-mode-toggle button:first-child {
  border-right: none;
}
.target-mode-toggle button.active {
  background: rgba(0, 255, 65, 0.1);
  color: var(--accent-green);
  border-color: var(--accent-green);
}
.target-list-area {
  display: none;
  flex-direction: column;
  gap: 6px;
  margin-top: 6px;
}
.target-list-area.visible {
  display: flex;
}
.target-list-textarea {
  width: 100%;
  min-height: 80px;
  max-height: 200px;
  background: var(--input-bg);
  color: var(--text-primary);
  border: 1px solid var(--card-border);
  padding: 6px 8px;
  font-family: inherit;
  font-size: 0.8rem;
  resize: vertical;
}
.target-list-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.7rem;
}
.target-list-toolbar .host-count {
  color: var(--accent-cyan);
  font-size: 0.7rem;
}
.target-list-toolbar .import-file-btn {
  background: transparent;
  border: 1px solid var(--card-border);
  color: var(--text-muted);
  padding: 2px 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.7rem;
}
.target-list-toolbar .import-file-btn:hover {
  color: var(--accent-green);
  border-color: var(--accent-green);
}
.target-list-file-input {
  display: none;
}

/* ===== Batch Script Output ===== */
.batch-script-note {
  color: var(--text-muted);
  font-size: 0.7rem;
  margin-top: 4px;
  font-style: italic;
}
.crafted-command.batch-mode {
  white-space: pre;
  font-size: 0.75rem;
  line-height: 1.5;
}

.option-group {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 0;
  overflow: hidden;
  transition: border-color 0.15s;
}
.option-group:hover { border-color: var(--card-hover-border); }
.option-group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  cursor: pointer;
  user-select: none;
}
.option-group-chevron {
  font-size: 0.6rem;
  color: var(--text-muted);
  transition: transform 0.12s ease;
  flex-shrink: 0;
}
.option-group.expanded .option-group-chevron { transform: rotate(90deg); }
.option-group-label {
  flex: 1;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.option-group-body {
  display: none;
  padding: 0 14px 12px;
}
.option-group.expanded .option-group-body { display: block; }
.compare-all-link {
  font-size: 0.68rem;
  color: var(--accent-cyan);
  cursor: pointer;
  text-decoration: none;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.compare-all-link:hover { text-decoration: underline; opacity: 1; }

.pill-group { display: flex; flex-wrap: wrap; gap: 6px; }
.pill-btn {
  padding: 6px 14px;
  border: 1px solid var(--card-border);
  border-radius: 0;
  background: transparent;
  color: var(--text-secondary);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
}
.pill-btn:hover {
  border-color: var(--accent-green);
  color: var(--text-primary);
  background: rgba(166, 226, 46, 0.05);
}
.pill-btn.active {
  background: var(--accent-green);
  border-color: var(--accent-green);
  color: #0d0e0a;
  font-weight: 600;
}

.custom-input-wrapper {
  margin-top: 8px;
  display: none;
}
.custom-input-wrapper.visible { display: block; }
.custom-input {
  padding: 7px 11px;
  font-family: inherit;
  font-size: 0.82rem;
  background: var(--input-bg);
  color: var(--text-primary);
  border: 1px solid var(--input-border);
  border-radius: 0;
  outline: none;
  width: 100%;
  max-width: 300px;
  transition: border-color 0.2s;
}
.custom-input:focus {
  border-color: var(--accent-green);
}

.toggles-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 14px;
}

.toggle-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px;
  background: transparent;
  border: 1px solid var(--card-border);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  white-space: nowrap;
}
.toggle-item:hover { border-color: var(--card-hover-border); }
.toggle-item.active {
  border-color: var(--accent-green);
  background: rgba(166, 226, 46, 0.06);
}
.toggle-item .toggle-flag {
  font-family: inherit;
  font-size: 0.68rem;
  color: var(--accent-cyan);
}
.toggle-item.active .toggle-flag { color: var(--accent-green); }
.toggle-item .toggle-label {
  font-size: 0.65rem;
  color: var(--text-muted);
}
.toggle-item.active .toggle-label { color: var(--text-secondary); }
.toggle-item .toggle-info {
  color: var(--accent-cyan);
  cursor: pointer;
  font-size: 0.7rem;
  text-decoration: none;
  flex-shrink: 0;
  opacity: 0.4;
  transition: opacity 0.2s;
}
.toggle-item .toggle-info:hover { opacity: 1; }

.toggle-custom-input {
  width: 100%;
  flex-basis: 100%;
  margin-top: 2px;
  display: none;
}
.toggle-custom-input.visible { display: block; }

/* Crafted command output */
.crafted-output {
  background: var(--card-bg);
  border: 1px solid var(--accent-green);
  border-radius: 0;
  padding: 18px;
  margin-top: 20px;
  position: sticky;
  bottom: 16px;
}
.crafted-output-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent-green);
  margin-bottom: 10px;
  font-weight: 700;
}
.crafted-command {
  font-family: inherit;
  font-size: 0.95rem;
  padding: 14px 16px;
  background: var(--code-bg);
  border-radius: 0;
  border: 1px solid var(--card-border);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.7;
}
.crafted-command .cmd-tool { color: var(--text-primary); font-weight: 700; }
.crafted-command .cmd-flag { color: var(--accent-cyan); }
.crafted-command .cmd-option { color: var(--accent-yellow); }
.crafted-command .cmd-timing { color: var(--accent-cyan); }
.crafted-command .cmd-target { color: var(--accent-green); }

.crafted-copy-btn {
  display: inline-block;
  margin-top: 12px;
  padding: 6px 16px;
  background: transparent;
  border: 1px solid var(--accent-green);
  color: var(--accent-green);
  font-family: inherit;
  font-size: 0.75rem;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: background 0.15s;
}
.crafted-copy-btn:hover {
  background: rgba(166, 226, 46, 0.06);
}

/* ===== Docs Section ===== */
.docs-container {
  position: relative;
  z-index: 1;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--accent-cyan);
  font-size: 0.82rem;
  cursor: pointer;
  margin-bottom: 18px;
  opacity: 0.8;
  transition: opacity 0.2s;
}
.back-link:hover { text-decoration: underline; opacity: 1; }

.doc-category-group {
  margin-bottom: 28px;
  scroll-margin-top: 20px;
}
.doc-category-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--card-border);
}
.doc-category-title {
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--accent-purple);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.doc-category-count {
  font-size: 0.6rem;
  font-weight: 700;
  background: rgba(174, 129, 255, 0.12);
  color: var(--accent-purple);
  padding: 2px 8px;
  border-radius: 0;
}

.doc-entries-grid {
  display: grid;

.doc-entry {

.platform-block {

}

  font-size: 0.78rem;

}

.doc-tips {

}
.doc-tips-label {
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--accent-cyan);
  margin-bottom: 5px;

}

/* ===== Rescan History ===== */
.rescan-container {
  position: relative;
  z-index: 1;
}

.env-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
.env-tab {

.drop-zone {

}

}
.drop-zone-icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.6; }

.paste-import-area { margin-bottom: 18px; }
.paste-btn {

}
.paste-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
.paste-textarea {

  padding: 12px;
  font-family: inherit;
  font-size: 0.78rem;

  color: var(--text-primary);

}
.paste-textarea:focus { border-color: var(--accent-green); }
.paste-textarea.visible { display: block; }
.import-btn {
  display: none;
  margin-top: 10px;
  padding: 6px 16px;

  border: 1px solid var(--accent-green);
  color: var(--accent-green);
  font-family: inherit;
  font-size: 0.75rem;

  text-transform: uppercase;

  transition: background 0.15s;
}
.import-btn:hover { background: rgba(166, 226, 46, 0.06); }
.import-btn.visible { display: inline-block; }

/* Classify Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  z-index: 300;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 0;
  padding: 28px;
  width: 90%;
  max-width: 480px;
}
.modal h3 {
  font-size: 1.05rem;
  margin-bottom: 18px;
  color: var(--text-primary);
  font-weight: 600;
}
.modal-field { margin-bottom: 14px; }
.modal-field label {
  display: block;
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}
.modal-field input, .modal-field select {
  width: 100%;
  padding: 8px 12px;
  background: var(--input-bg);
  color: var(--text-primary);
  border: 1px solid var(--input-border);
  border-radius: 0;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}
.modal-field input:focus, .modal-field select:focus { border-color: var(--accent-green); }
.modal-field select { cursor: pointer; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.modal-btn-cancel {
  padding: 6px 16px;
  background: transparent;
  border: 1px solid var(--card-border);
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 0.75rem;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: border-color 0.15s;
}
.modal-btn-cancel:hover { border-color: var(--text-muted); }
.modal-btn-save {
  padding: 6px 16px;
  background: transparent;
  border: 1px solid var(--accent-green);
  color: var(--accent-green);
  font-family: inherit;
  font-size: 0.75rem;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: background 0.15s;
}
.modal-btn-save:hover { background: rgba(166, 226, 46, 0.06); }

/* Scan Timeline */
.scan-timeline { margin-top: 18px; }
.target-group { margin-bottom: 22px; }
.target-group-entries {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 6px;
  align-items: start;
}
.target-group-header {
  font-family: inherit;
  font-size: 0.9rem;
  color: var(--accent-cyan);
  font-weight: 600;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--card-border);
}
.scan-entry {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 0;
  cursor: pointer;
  transition: all 0.2s;
}
.scan-entry:hover { border-color: var(--card-hover-border); transform: translateX(2px); }
.scan-entry.selected { border-color: var(--accent-green); background: rgba(166, 226, 46, 0.06); }
.scan-entry-select {
  width: 18px; height: 18px;
  border: 2px solid var(--card-border);
  border-radius: 0;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.scan-entry.selected .scan-entry-select { border-color: var(--accent-green); background: var(--accent-green); }
.scan-entry.selected .scan-entry-select::after { content: '\2713'; color: #fff; font-size: 0.7rem; }
.scan-entry-title { flex: 1; font-size: 0.85rem; }
.scan-entry-type {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 0;
  background: rgba(102, 217, 239, 0.15);
  color: var(--accent-cyan);
}
.scan-entry-date { font-size: 0.75rem; color: var(--text-muted); }

.compare-btn {
  display: none;
  margin-top: 14px;
  padding: 6px 16px;
  background: transparent;
  border: 1px solid var(--accent-green);
  color: var(--accent-green);
  font-family: inherit;
  font-size: 0.75rem;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: background 0.15s;
}
.compare-btn:hover { background: rgba(166, 226, 46, 0.06); }
.compare-btn.visible { display: inline-block; }

/* Comparison View */
.comparison-view { display: none; }
.comparison-view.visible { display: block; }
.comparison-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
.comparison-scan-info {
  font-size: 0.8rem;
  color: var(--text-secondary);
}
.comparison-scan-info strong { color: var(--text-primary); }
.comparison-summary {
  font-size: 0.8rem;
  padding: 4px 12px;
  border-radius: 0;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
}
.comparison-back {
  color: var(--accent-cyan);
  font-size: 0.85rem;
  cursor: pointer;
  margin-bottom: 12px;
  display: inline-block;
}
.comparison-back:hover { text-decoration: underline; }

.diff-table { width: 100%; border-collapse: collapse; margin-bottom: 18px; }
.diff-table th {
  text-align: left;
  padding: 10px 12px;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  border-bottom: 2px solid var(--card-border);
  font-weight: 700;
}
.diff-table td {
  padding: 8px 12px;
  font-size: 0.8rem;
  border-bottom: 1px solid var(--card-border);
  font-family: inherit;
  transition: background 0.15s;
}
.diff-table tr.diff-fixed { background: rgba(166, 226, 46, 0.1); }
.diff-table tr.diff-fixed td:last-child { color: var(--accent-green); }
.diff-table tr.diff-new-issue { background: rgba(249, 38, 114, 0.1); }
.diff-table tr.diff-new-issue td:last-child { color: var(--accent-pink); }
.diff-table tr.diff-changed { background: rgba(230, 219, 116, 0.1); }
.diff-table tr.diff-changed td:last-child { color: var(--accent-yellow); }
.diff-table tr.diff-same td { color: var(--text-muted); }

.raw-diff { display: flex; gap: 16px; margin-top: 16px; }
.raw-diff-pane {
  flex: 1;
  overflow-x: auto;
}
.raw-diff-pane pre {
  font-family: inherit;
  font-size: 0.75rem;
  background: var(--code-bg);
  padding: 12px;
  border-radius: 0;
  border: 1px solid var(--card-border);
  white-space: pre-wrap;
  word-break: break-all;
}
.raw-diff-pane .diff-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.diff-line-added { color: var(--accent-pink); }
.diff-line-removed { color: var(--accent-green); }
.diff-line-changed { color: var(--accent-yellow); }
.diff-line-same { color: var(--text-muted); }

/* ===== Empty State ===== */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
}
.empty-state-icon { font-size: 2.5rem; margin-bottom: 14px; opacity: 0.5; }
.empty-state-text { font-size: 0.95rem; }
.empty-state-sub { font-size: 0.78rem; margin-top: 6px; }

/* ===== Search Results ===== */
.search-results-section {
  margin-bottom: 28px;
  position: relative;
  z-index: 1;
}
.search-results-section h3 {
  font-family: inherit;
  font-size: 0.95rem;
  color: var(--accent-green);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--card-border);
  letter-spacing: 0.5px;
}

/* ===== Selection glow ===== */
::selection {
  background: rgba(166, 226, 46, 0.3);
  color: var(--text-primary);
}

/* ===== Focus visible ===== */
:focus-visible {
  outline: 2px solid var(--accent-green);
  outline-offset: 2px;
}

/* ===== Utility ===== */
.hidden { display: none !important; }

/* ================================================================
   UTILITY FUNCTIONS
   ================================================================ */

function generateId() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function escapeHtml(str) {
  if (str == null) return '';
  var div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

function copyToClipboard(text, btn) {
  function fallbackCopy() {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
  }

  function onSuccess() {
    if (btn) {
      var orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
    }
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(function() {
      fallbackCopy();
      onSuccess();
    });
  } else {
    fallbackCopy();
    onSuccess();
  }
}

function highlightText(text, query) {
  if (!query) return escapeHtml(text);
  var escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  var re = new RegExp('(' + escaped + ')', 'gi');
  return escapeHtml(text).replace(re, '<mark>$1</mark>');
}

function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function formatDate(iso) {
  try {
    var d = new Date(iso);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch(e) { return iso; }
}

/* ================================================================

   ================================================================ */

function buildSidebar() {
  var nav = document.getElementById('sidebarNav');
  var html = '';

  // Reference sections
  var refSections = [];
  commands.forEach(function(c) {
    if (refSections.indexOf(c.section) === -1) refSections.push(c.section);
  });
  if (refSections.length > 0) {
    html += '<div class="nav-group-label">Reference</div>';
    refSections.forEach(function(s) {
      html += '<div class="nav-item" data-type="reference" data-key="' + escapeHtml(s) + '">' +
        '<span class="nav-item-label">' + escapeHtml(s) + '</span></div>';
    });
  }

  // Craft tools
  var craftKeys = Object.keys(craftTools);
  if (craftKeys.length > 0) {
    html += '<div class="nav-group-label">Craft</div>';
    craftKeys.forEach(function(k) {
      html += '<div class="nav-item" data-type="craft" data-key="' + escapeHtml(k) + '">' +
        '<span class="nav-item-label">' + escapeHtml(craftTools[k].name || k) + '</span></div>';
    });
  }

  // Docs (expandable tree)
  var docKeys = Object.keys(docs);
  if (docKeys.length > 0) {
    html += '<div class="nav-group-label">Docs</div>';
    docKeys.forEach(function(k) {
      // Extract unique categories in order
      var cats = [];
      var catCounts = {};
      docs[k].forEach(function(e) {
        var cat = e.category || 'Other';
        if (cats.indexOf(cat) === -1) cats.push(cat);
        catCounts[cat] = (catCounts[cat] || 0) + 1;
      });
      html += '<div class="nav-tree-parent" data-type="docs" data-key="' + escapeHtml(k) + '">' +
        '<span class="nav-tree-parent-label"><span class="nav-tree-chevron">&#9654;</span>' +
        escapeHtml(k) + ' Reference</span></div>';
      html += '<div class="nav-tree-children" data-parent="' + escapeHtml(k) + '">';
      cats.forEach(function(cat) {
        html += '<div class="nav-tree-child" data-type="docs" data-key="' + escapeHtml(k) +
          '" data-category="' + escapeHtml(cat) + '">' +
          '<span>' + escapeHtml(cat) + '</span>' +
          '<span class="tree-child-count">' + catCounts[cat] + '</span></div>';
      });
      html += '</div>';
    });
  }

  // Rescan History
  html += '<div class="nav-group-label">History</div>';
  html += '<div class="nav-item" data-type="rescan" data-key="rescan">' +
    '<span class="nav-item-label">Rescan History</span></div>';

  // Header Audit
  html += '<div class="nav-group-label">Audit</div>';
  html += '<div class="nav-item" data-type="audit" data-key="audit">' +
    '<span class="nav-item-label">Header Audit</span></div>';

  nav.innerHTML = html;

  // Attach click handlers for flat nav items
  var items = nav.querySelectorAll('.nav-item');
  for (var i = 0; i < items.length; i++) {
    (function(item) {
      item.addEventListener('click', function() {
        var type = item.getAttribute('data-type');
        var key = item.getAttribute('data-key');
        navigateTo({ type: type, key: key });
        closeMobileSidebar();
      });
    })(items[i]);
  }

  // Attach tree parent toggle + navigation
  var treeParents = nav.querySelectorAll('.nav-tree-parent');
  for (var tp = 0; tp < treeParents.length; tp++) {
    (function(parent) {
      parent.addEventListener('click', function() {
        var key = parent.getAttribute('data-key');
        var children = nav.querySelector('.nav-tree-children[data-parent="' + key + '"]');
        var isExpanded = parent.classList.contains('expanded');
        if (isExpanded) {
          parent.classList.remove('expanded');
          children.classList.remove('expanded');
        } else {
          parent.classList.add('expanded');
          children.classList.add('expanded');
        }
        // Also navigate to the docs page
        navigateTo({ type: parent.getAttribute('data-type'), key: key });
      });
    })(treeParents[tp]);
  }

  // Attach tree child click → navigate + scroll to category
  var treeChildren = nav.querySelectorAll('.nav-tree-child');
  for (var tc = 0; tc < treeChildren.length; tc++) {
    (function(child) {
      child.addEventListener('click', function() {
        var type = child.getAttribute('data-type');
        var key = child.getAttribute('data-key');
        var cat = child.getAttribute('data-category');
        navigateTo({ type: type, key: key }, 'doc-cat-' + key + '-' + cat.replace(/[^a-zA-Z0-9]/g, '-'));
        closeMobileSidebar();
      });
    })(treeChildren[tc]);
  }
}

function updateSidebarActive() {
  var items = document.querySelectorAll('.nav-item');
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var type = item.getAttribute('data-type');
    var key = item.getAttribute('data-key');
    var isActive = activeSection && activeSection.type === type && activeSection.key === key;
    if (isActive) item.classList.add('active');
    else item.classList.remove('active');
  }
  // Tree parents
  var treeParents = document.querySelectorAll('.nav-tree-parent');
  for (var tp = 0; tp < treeParents.length; tp++) {
    var p = treeParents[tp];
    var pType = p.getAttribute('data-type');
    var pKey = p.getAttribute('data-key');
    var pActive = activeSection && activeSection.type === pType && activeSection.key === pKey;
    if (pActive) {
      p.classList.add('active');
      // Auto-expand when active
      p.classList.add('expanded');
      var children = document.querySelector('.nav-tree-children[data-parent="' + pKey + '"]');
      if (children) children.classList.add('expanded');
    } else {
      p.classList.remove('active');
    }
  }
}

function updateSidebarMatchCounts(counts) {
  var items = document.querySelectorAll('.nav-item, .nav-tree-parent');
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var type = item.getAttribute('data-type');
    var key = item.getAttribute('data-key');
    var countKey = type + ':' + key;
    var existing = item.querySelector('.match-count');
    if (existing) existing.remove();
    if (counts && counts[countKey] !== undefined) {
      var span = document.createElement('span');
      span.className = 'match-count';
      span.textContent = counts[countKey];
      item.appendChild(span);
    }
  }
}

/* ================================================================
   NAVIGATION
   ================================================================ */

function navigateTo(section, scrollToId) {
  previousSection = activeSection;
  activeSection = section;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  updateSidebarActive();
  updateSidebarMatchCounts(null);
  renderMainContent(scrollToId);
}

function renderMainContent(scrollToId) {
  var main = document.getElementById('mainContent');

  if (!activeSection) {
    main.innerHTML = renderEmptyState('Select a section from the sidebar', 'Or press / to search');
    return;
  }

  switch (activeSection.type) {
    case 'reference':
      renderReferenceSection(main, activeSection.key);
      break;
    case 'craft':
      renderCraftSection(main, activeSection.key);
      break;
    case 'docs':
      renderDocsSection(main, activeSection.key, scrollToId);
      break;
    case 'rescan':
      renderRescanSection(main);
      break;
    case 'audit':
      renderAuditSection(main);
      break;
    default:
      main.innerHTML = renderEmptyState('Unknown section type');
  }

  if (scrollToId) {
    setTimeout(function() {
      var el = document.getElementById(scrollToId);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
}

function renderEmptyState(text, sub) {
  return '<div class="empty-state">' +
    '<div class="empty-state-text">' + escapeHtml(text) + '</div>' +
    (sub ? '<div class="empty-state-sub">' + escapeHtml(sub) + '</div>' : '') +
    '</div>';
}

/* ================================================================
   REFERENCE SECTION RENDERER
   ================================================================ */

function renderReferenceSection(container, sectionName) {
  var items = commands.filter(function(c) { return c.section === sectionName; });
  if (items.length === 0) {
    container.innerHTML = '<div class="section-header"><div class="section-prompt"># <span class="cmd">scanref</span> <span class="flag">--section</span> <span class="arg">' + escapeHtml(sectionName.toLowerCase().replace(/\s+/g, '-')) + '</span> <span class="flag">--count</span> <span class="arg">0</span></div><h2>' + escapeHtml(sectionName) + '</h2><p>No commands yet. Add entries to the commands array.</p></div>' +
      renderEmptyState('No commands in this section');
    return;
  }

  var html = '<div class="section-header"><div class="section-prompt"># <span class="cmd">scanref</span> <span class="flag">--section</span> <span class="arg">' + escapeHtml(sectionName.toLowerCase().replace(/\s+/g, '-')) + '</span> <span class="flag">--count</span> <span class="arg">' + items.length + '</span></div><h2>' + escapeHtml(sectionName) + '</h2><p>' +
    items.length + ' command' + (items.length !== 1 ? 's' : '') + '</p></div>';
  html += '<div class="cards-grid">';
  items.forEach(function(cmd, i) { html += renderCommandCard(cmd, i); });
  html += '</div>';
  container.innerHTML = html;
  attachCopyHandlers(container);
  // Card expand/collapse handlers
  var cards = container.querySelectorAll('.card');
  for (var ci = 0; ci < cards.length; ci++) {
    (function(card) {
      var header = card.querySelector('.card-header');
      if (header) {
        header.addEventListener('click', function() { card.classList.toggle('expanded'); });
      }
    })(cards[ci]);
  }
}

function renderCommandCard(cmd, idx) {
  var q = searchQuery;
  var tagsHtml = '';
  (cmd.tags || []).forEach(function(t) {
    tagsHtml += '<span class="tag-badge">' + highlightText(t, q) + '</span>';
  });

  return '<div class="card">' +
    '<div class="card-header">' +
    '<span class="card-chevron">&#9654;</span>' +
    '<div class="card-header-main">' +
    '<div class="card-title">' + highlightText(cmd.title, q) + '</div>' +
    '<div class="card-tags"><span class="tag-badge">' + escapeHtml(cmd.section) + '</span>' + tagsHtml + '</div>' +
    '</div></div>' +
    '<div class="card-body">' +
    '<div class="code-block-wrapper">' +
    '<pre class="code-block">' + highlightText(cmd.cmd, q) + '</pre>' +
    '<button class="copy-btn" data-copy="' + escapeHtml(cmd.cmd) + '">Copy</button>' +
    '</div>' +
    (cmd.notes ? '<div class="card-notes">' + highlightText(cmd.notes, q) + '</div>' : '') +
    (cmd.docUrl ? '<a class="card-doc-link" href="' + escapeHtml(cmd.docUrl) + '" target="_blank" rel="noopener">&#9656; official docs</a>' : '') +
    '</div></div>';
}

function attachCopyHandlers(container) {
  var btns = container.querySelectorAll('.copy-btn');
  for (var i = 0; i < btns.length; i++) {
    (function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        copyToClipboard(btn.getAttribute('data-copy'), btn);
      });
    })(btns[i]);
  }
  var craftBtns = container.querySelectorAll('.crafted-copy-btn');
  for (var j = 0; j < craftBtns.length; j++) {
    (function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        copyToClipboard(btn.getAttribute('data-copy'), btn);
      });
    })(craftBtns[j]);
  }
}

/* ================================================================
   CRAFT SECTION RENDERER
   ================================================================ */

function getCraftState(toolKey) {
  if (!craftState[toolKey]) {
    var tool = craftTools[toolKey];
    if (!tool) return null;
    var state = { target: '', targetMode: 'single', targetList: [], batchEnabled: false, groups: {}, toggles: {}, customInputs: {} };
    (tool.groups || []).forEach(function(g) {
      var defaultIdx = -1;
      g.options.forEach(function(o, i) { if (o.default) defaultIdx = i; });
      state.groups[g.name] = defaultIdx;
    });
    (tool.toggles || []).forEach(function(t) {
      state.toggles[t.flag] = false;
    });
    craftState[toolKey] = state;
  }
  return craftState[toolKey];
}

function buildBatchCommand(toolKey) {
  var tool = craftTools[toolKey];
  var state = getCraftState(toolKey);
  if (!tool || !state) return '';

  var hosts = state.targetList;
  if (hosts.length < 2) return buildCraftedCommand(toolKey);

  // Build base command without target
  var parts = [tool.name || toolKey];
  (tool.groups || []).forEach(function(g) {
    var selIdx = state.groups[g.name];
    if (selIdx >= 0 && selIdx < g.options.length) {
      var opt = g.options[selIdx];
      if (opt.flag) {
        var flag = opt.flag;
        if (opt.customInput && state.customInputs[opt.flag]) {
          flag += ' ' + state.customInputs[opt.flag];
        }
        parts.push(flag);
      }
    }
  });
  (tool.toggles || []).forEach(function(t) {
    if (state.toggles[t.flag]) {
      var flag = t.flag;
      if (t.customInput && state.customInputs[t.flag]) {
        flag += ' ' + state.customInputs[t.flag];
      }
      parts.push(flag);
    }
  });
  var baseCmd = parts.join(' ');

  if (hosts.length < 10) {
    return '@echo off\nfor %%H in (' + hosts.join(' ') + ') do (\n    ' + baseCmd + ' %%H\n    echo ---\n)';
  } else {
    return '@echo off\nfor /F "tokens=*" %%H in (targets.txt) do (\n    ' + baseCmd + ' %%H\n    echo ---\n)';
  }
}

function buildCraftedCommand(toolKey) {
  var tool = craftTools[toolKey];
  var state = getCraftState(toolKey);
  if (!tool || !state) return '';

  var parts = [tool.name || toolKey];

  (tool.groups || []).forEach(function(g) {
    var selIdx = state.groups[g.name];
    if (selIdx >= 0 && selIdx < g.options.length) {
      var opt = g.options[selIdx];
      if (opt.flag) {
        var flag = opt.flag;
        if (opt.customInput && state.customInputs[opt.flag]) {
          flag += ' ' + state.customInputs[opt.flag];
        }
        parts.push(flag);
      }
    }
  });

  (tool.toggles || []).forEach(function(t) {
    if (state.toggles[t.flag]) {
      var flag = t.flag;
      if (t.customInput && state.customInputs[t.flag]) {
        flag += ' ' + state.customInputs[t.flag];
      }
      parts.push(flag);
    }
  });

  if (state.targetMode === 'list' && state.targetList.length >= 2 && !state.batchEnabled) {
    if ((tool.name || toolKey) === 'nmap') {
      parts.push('-iL targets.txt');
    } else {
      parts.push(state.targetList[0] || '');
    }
  } else if (state.target) {
    parts.push(state.target);
  }

  return parts.join(' ');
}

function colorCodeCommand(toolKey) {
  var tool = craftTools[toolKey];
  var state = getCraftState(toolKey);
  if (!tool || !state) return '';

  var html = '<span class="cmd-tool">' + escapeHtml(tool.name || toolKey) + '</span>';

  (tool.groups || []).forEach(function(g) {
    var selIdx = state.groups[g.name];
    if (selIdx >= 0 && selIdx < g.options.length) {
      var opt = g.options[selIdx];
      if (opt.flag) {
        var isTimingFlag = /^-T\d/.test(opt.flag);
        var cls = isTimingFlag ? 'cmd-timing' : 'cmd-flag';
        html += ' <span class="' + cls + '">' + escapeHtml(opt.flag) + '</span>';
        if (opt.customInput && state.customInputs[opt.flag]) {
          html += ' <span class="cmd-option">' + escapeHtml(state.customInputs[opt.flag]) + '</span>';
        }
      }
    }
  });

  (tool.toggles || []).forEach(function(t) {
    if (state.toggles[t.flag]) {
      html += ' <span class="cmd-flag">' + escapeHtml(t.flag) + '</span>';
      if (t.customInput && state.customInputs[t.flag]) {
        html += ' <span class="cmd-option">' + escapeHtml(state.customInputs[t.flag]) + '</span>';
      }
    }
  });

  if (state.target) {
    html += ' <span class="cmd-target">' + escapeHtml(state.target) + '</span>';
  }

  return html;
}

function renderCraftSection(container, toolKey) {
  var tool = craftTools[toolKey];
  if (!tool) {
    container.innerHTML = '<div class="section-header"><div class="section-prompt"># <span class="cmd">scanref</span> <span class="flag">--craft</span> <span class="arg">' + escapeHtml(toolKey) + '</span></div><h2>Craft: ' + escapeHtml(toolKey) + '</h2><p>Tool not configured yet.</p></div>' + renderEmptyState('Add this tool to craftTools object');

  }

  var state = getCraftState(toolKey);
  var html = '<div class="craft-container">';
  html += '<div class="section-header"><div class="section-prompt"># <span class="cmd">scanref</span> <span class="flag">--craft</span> <span class="arg">' + escapeHtml(toolKey) + '</span></div><h2>' + escapeHtml(tool.name || toolKey) + '</h2>' +
    '<p>' + escapeHtml(tool.description || '') + '</p></div>';

  // Target input — dual mode
  html += '<div class="target-input-wrapper">' +
    '<label>Target' +
    '<span class="target-mode-toggle">' +
    '<button class="target-mode-btn' + (state.targetMode === 'single' ? ' active' : '') + '" data-mode="single">Single</button>' +
    '<button class="target-mode-btn' + (state.targetMode === 'list' ? ' active' : '') + '" data-mode="list">List</button>' +
    '</span></label>' +
    '<input type="text" class="target-input' + (state.targetMode === 'list' ? '" style="display:none' : '') + '" id="craftTarget" value="' + escapeHtml(state.target) +
    '" placeholder="' + escapeHtml(tool.targetPlaceholder || 'Enter target') + '">' +
    '<div class="target-list-area' + (state.targetMode === 'list' ? ' visible' : '') + '">' +
    '<textarea class="target-list-textarea" id="craftTargetList" placeholder="one host per line">' + escapeHtml(state.targetList.join('\n')) + '</textarea>' +
    '<div class="target-list-toolbar">' +
    '<span class="host-count" id="hostCount">' + state.targetList.length + ' hosts</span>' +
    '<button class="import-file-btn" id="importTargetsBtn">Import .txt</button>' +
    '<input type="file" class="target-list-file-input" id="targetFileInput" accept=".txt">' +
    '</div>' +
    '</div>' +
    '</div>';

  // Option groups
  html += '<div class="craft-groups-grid">';
  (tool.groups || []).forEach(function(g, gi) {
    html += '<div class="option-group">' +
      '<div class="option-group-header">' +
      '<span class="option-group-chevron">&#9654;</span>' +
      '<span class="option-group-label">' + escapeHtml(g.name) + '</span>' +
      '<span class="compare-all-link" data-tool="' + escapeHtml(toolKey) + '" data-group="' + escapeHtml(g.name) + '">Compare all &rarr;</span>' +
      '</div><div class="option-group-body"><div class="pill-group">';

    g.options.forEach(function(opt, oi) {
      var isActive = state.groups[g.name] === oi;
      html += '<button class="pill-btn' + (isActive ? ' active' : '') + '" data-group="' + escapeHtml(g.name) +
        '" data-index="' + oi + '">' + escapeHtml(opt.label) + '</button>';
    });
    html += '</div>';

    // Custom inputs
    g.options.forEach(function(opt, oi) {
      if (opt.customInput) {
        var visible = state.groups[g.name] === oi;
        html += '<div class="custom-input-wrapper' + (visible ? ' visible' : '') + '" data-group="' + escapeHtml(g.name) +
          '" data-index="' + oi + '">' +
          '<input type="text" class="custom-input" data-flag="' + escapeHtml(opt.flag) +
          '" placeholder="' + escapeHtml(opt.placeholder || '') +
          '" value="' + escapeHtml(state.customInputs[opt.flag] || '') + '">' +
          '</div>';
      }
    });
    html += '</div></div>';
  });

  // Toggles
  if ((tool.toggles || []).length > 0) {
    html += '<div class="option-group">' +
      '<div class="option-group-header">' +
      '<span class="option-group-chevron">&#9654;</span>' +
      '<span class="option-group-label">Options</span></div>' +
      '<div class="option-group-body"><div class="toggles-grid">';
    tool.toggles.forEach(function(t, ti) {
      var isOn = state.toggles[t.flag];
      html += '<div class="toggle-item' + (isOn ? ' active' : '') + '" data-flag="' + escapeHtml(t.flag) + '">' +
        '<span class="toggle-flag">' + escapeHtml(t.flag) + '</span>' +
        '<span class="toggle-label">' + escapeHtml(t.label) + '</span>' +
        (t.docId ? '<span class="toggle-info" data-docid="' + escapeHtml(t.docId) + '" data-tool="' + escapeHtml(toolKey) + '" title="View docs">&#9432;</span>' : '') +
        '<input type="checkbox" data-flag="' + escapeHtml(t.flag) + '"' + (isOn ? ' checked' : '') + ' style="display:none;">' +
        '</div>';
      if (t.customInput) {
        html += '<div class="toggle-custom-input' + (isOn ? ' visible' : '') + '" data-toggle-flag="' + escapeHtml(t.flag) + '">' +
          '<input type="text" class="custom-input" data-flag="' + escapeHtml(t.flag) +
          '" placeholder="' + escapeHtml(t.placeholder || '') +
          '" value="' + escapeHtml(state.customInputs[t.flag] || '') + '"></div>';
      }
    });

  }

  // Batch toggle — visible only in list mode with 2+ hosts

  html += '<div class="option-group" id="batchToggleGroup" style="' + (showBatch ? '' : 'display:none;') + '">' +
    '<div class="option-group-header">' +
    '<span class="option-group-chevron">&#9654;</span>' +
    '<span class="option-group-label">Batch</span></div>' +
    '<div class="option-group-body"><div class="toggles-grid">' +
    '<div class="toggle-item' + (state.batchEnabled ? ' active' : '') + '" data-flag="__batch__">' +
    '<span class="toggle-flag">for %%H</span>' +
    '<span class="toggle-label">Batch (CMD loop)</span>' +
    '<input type="checkbox" data-flag="__batch__"' + (state.batchEnabled ? ' checked' : '') + ' style="display:none;">' +
    '</div>' +
    '</div></div></div>';

  html += '</div>'; // .craft-groups-grid

  // Crafted command output
  html += '<div class="crafted-output">' +
    '<div class="crafted-output-label">Crafted Command</div>' +

    '<div class="batch-script-note" style="display:none;"></div>' +
    '<button class="crafted-copy-btn" id="craftedCopyBtn" data-copy="' + escapeHtml(buildCraftedCommand(toolKey)) + '">Copy Command</button>' +
    '</div>';

  html += '</div>';
  container.innerHTML = html;
  attachCraftHandlers(container, toolKey);
}

function parseTargetList(text) {
  return text.split('\n')
    .map(function(line) { return line.trim(); })
    .filter(function(line) { return line.length > 0; })
    .filter(function(line, i, arr) { return arr.indexOf(line) === i; }); // dedupe
}

function attachCraftHandlers(container, toolKey) {
  var tool = craftTools[toolKey];
  var state = getCraftState(toolKey);

  // Option group expand/collapse handlers
  var optGroups = container.querySelectorAll('.option-group');
  for (var og = 0; og < optGroups.length; og++) {
    (function(group) {
      var header = group.querySelector('.option-group-header');
      if (header) {
        header.addEventListener('click', function(e) {
          if (e.target.classList.contains('compare-all-link')) return;
          group.classList.toggle('expanded');
        });
      }
    })(optGroups[og]);
  }

  function updateOutput() {
    var preview = document.getElementById('craftedPreview');
    var copyBtn = document.getElementById('craftedCopyBtn');
    if (state.targetMode === 'list' && state.batchEnabled && state.targetList.length >= 2) {
      var batchCmd = buildBatchCommand(toolKey);
      if (preview) {
        preview.classList.add('batch-mode');
        preview.textContent = batchCmd;
      }
      if (copyBtn) copyBtn.setAttribute('data-copy', batchCmd);
      var note = container.querySelector('.batch-script-note');
      if (note) {
        if (state.targetList.length >= 10) {
          note.textContent = 'Save host list as targets.txt in the same directory before running.';
          note.style.display = '';
        } else {
          note.style.display = 'none';
        }
      }
    } else {
      if (preview) {
        preview.classList.remove('batch-mode');
        preview.innerHTML = colorCodeCommand(toolKey);
      }
      if (copyBtn) copyBtn.setAttribute('data-copy', buildCraftedCommand(toolKey));
      var note = container.querySelector('.batch-script-note');
      if (note) {
        if (state.targetMode === 'list' && state.targetList.length >= 2 && !state.batchEnabled && (craftTools[toolKey].name || toolKey) === 'nmap') {
          note.textContent = 'Save host list as targets.txt and use -iL flag.';
          note.style.display = '';
        } else {
          note.style.display = 'none';
        }
      }
    }
  }

  // Target input
  var targetInput = container.querySelector('#craftTarget');
  if (targetInput) {
    targetInput.addEventListener('input', function() {
      state.target = targetInput.value;
      updateOutput();
    });
  }

  // Target mode toggle
  var modeBtns = container.querySelectorAll('.target-mode-btn');
  for (var mb = 0; mb < modeBtns.length; mb++) {
    (function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        state.targetMode = btn.getAttribute('data-mode');
        for (var m = 0; m < modeBtns.length; m++) {
          modeBtns[m].classList.toggle('active', modeBtns[m].getAttribute('data-mode') === state.targetMode);
        }
        var singleInput = container.querySelector('#craftTarget');
        var listArea = container.querySelector('.target-list-area');
        if (state.targetMode === 'list') {
          if (singleInput) singleInput.style.display = 'none';
          if (listArea) listArea.classList.add('visible');
        } else {
          if (singleInput) singleInput.style.display = '';
          if (listArea) listArea.classList.remove('visible');
          state.batchEnabled = false;
        }
        updateOutput();
      });
    })(modeBtns[mb]);
  }

  // Target list textarea
  var listTextarea = container.querySelector('#craftTargetList');
  if (listTextarea) {
    listTextarea.addEventListener('input', function() {
      state.targetList = parseTargetList(listTextarea.value);
      var hostCount = container.querySelector('#hostCount');
      if (hostCount) hostCount.textContent = state.targetList.length + ' hosts';
      updateOutput();
    });
  }

  // Import targets file
  var importBtn = container.querySelector('#importTargetsBtn');
  var targetFileInput = container.querySelector('#targetFileInput');
  if (importBtn && targetFileInput) {
    importBtn.addEventListener('click', function() { targetFileInput.click(); });
    targetFileInput.addEventListener('change', function() {
      if (targetFileInput.files.length === 0) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        var existing = listTextarea ? listTextarea.value : '';
        var newText = existing ? existing + '\n' + e.target.result : e.target.result;
        if (listTextarea) listTextarea.value = newText;
        state.targetList = parseTargetList(newText);
        var hostCount = container.querySelector('#hostCount');
        if (hostCount) hostCount.textContent = state.targetList.length + ' hosts';
        updateOutput();
      };
      reader.readAsText(targetFileInput.files[0]);
    });
  }

  // Pill buttons
  var pills = container.querySelectorAll('.pill-btn');
  for (var i = 0; i < pills.length; i++) {
    (function(btn) {
      btn.addEventListener('click', function() {
        var groupName = btn.getAttribute('data-group');
        var index = parseInt(btn.getAttribute('data-index'));
        state.groups[groupName] = index;
        var groupPills = container.querySelectorAll('.pill-btn[data-group="' + groupName + '"]');
        for (var j = 0; j < groupPills.length; j++) {
          if (parseInt(groupPills[j].getAttribute('data-index')) === index) groupPills[j].classList.add('active');
          else groupPills[j].classList.remove('active');
        }
        var wrappers = container.querySelectorAll('.custom-input-wrapper[data-group="' + groupName + '"]');
        for (var k = 0; k < wrappers.length; k++) {
          if (parseInt(wrappers[k].getAttribute('data-index')) === index) wrappers[k].classList.add('visible');
          else wrappers[k].classList.remove('visible');
        }
        updateOutput();
      });
    })(pills[i]);
  }

  // Custom inputs (pill groups)
  var customInputs = container.querySelectorAll('.custom-input-wrapper .custom-input');
  for (var ci = 0; ci < customInputs.length; ci++) {
    (function(inp) {
      inp.addEventListener('input', function() {
        state.customInputs[inp.getAttribute('data-flag')] = inp.value;
        updateOutput();
      });
    })(customInputs[ci]);
  }

  // Toggle items (clickable pills)
  var toggleItems = container.querySelectorAll('.toggle-item[data-flag]');
  for (var ti = 0; ti < toggleItems.length; ti++) {
    (function(item) {
      item.addEventListener('click', function(e) {
        if (e.target.classList.contains('toggle-info')) return;
        var flag = item.getAttribute('data-flag');
        var chk = item.querySelector('input[type="checkbox"]');
        if (chk) {
          chk.checked = !chk.checked;
          state.toggles[flag] = chk.checked;
        }
        item.classList.toggle('active');
        var wrapper = container.querySelector('.toggle-custom-input[data-toggle-flag="' + flag + '"]');
        if (wrapper) {
          if (chk && chk.checked) wrapper.classList.add('visible');
          else wrapper.classList.remove('visible');
        }
        updateOutput();
      });
    })(toggleItems[ti]);
  }

  // Toggle custom inputs
  var toggleCustomInputs = container.querySelectorAll('.toggle-custom-input .custom-input');
  for (var tci = 0; tci < toggleCustomInputs.length; tci++) {
    (function(inp) {
      inp.addEventListener('input', function() {
        state.customInputs[inp.getAttribute('data-flag')] = inp.value;
        updateOutput();
      });
    })(toggleCustomInputs[tci]);
  }

  // Batch toggle handler
  var batchItem = container.querySelector('.toggle-item[data-flag="__batch__"]');
  if (batchItem) {
    batchItem.addEventListener('click', function() {
      state.batchEnabled = !state.batchEnabled;
      batchItem.classList.toggle('active', state.batchEnabled);
      var chk = batchItem.querySelector('input[type="checkbox"]');
      if (chk) chk.checked = state.batchEnabled;
      updateOutput();
    });
  }

  // Update batch toggle visibility when target list changes
  var origUpdateOutput = updateOutput;
  updateOutput = function() {
    var batchGroup = container.querySelector('#batchToggleGroup');
    if (batchGroup) {
      var showBatch = state.targetMode === 'list' && state.targetList.length >= 2;
      batchGroup.style.display = showBatch ? '' : 'none';
      if (!showBatch) state.batchEnabled = false;
    }
    origUpdateOutput();
  };

  // Info icons -> docs
  var infoIcons = container.querySelectorAll('.toggle-info');
  for (var ii = 0; ii < infoIcons.length; ii++) {
    (function(info) {
      info.addEventListener('click', function() {
        var docId = info.getAttribute('data-docid');
        var toolName = info.getAttribute('data-tool');
        navigateTo({ type: 'docs', key: toolName }, docId);
      });
    })(infoIcons[ii]);
  }

  // Compare all links
  var compareLinks = container.querySelectorAll('.compare-all-link');
  for (var cl = 0; cl < compareLinks.length; cl++) {
    (function(link) {
      link.addEventListener('click', function() {
        navigateTo({ type: 'docs', key: link.getAttribute('data-tool') });
      });
    })(compareLinks[cl]);
  }

  attachCopyHandlers(container);
}

   DOCS SECTION RENDERER
