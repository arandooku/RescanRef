<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScanRef</title>
<style>
/* ===== CSS Custom Properties ===== */
:root[data-theme="dark"] {
  --sidebar-bg: #272822;
  --main-bg: #1e1f1c;
  --accent-pink: #f92672;
  --accent-green: #a6e22e;
  --accent-cyan: #66d9ef;
  --accent-yellow: #e6db74;
  --accent-purple: #ae81ff;
  --accent-orange: #fd971f;
  --text-primary: #f8f8f2;
  --text-secondary: #b0b0a8;
  --text-muted: #75715e;
  --code-bg: #1a1b18;
  --card-bg: #2a2b26;
  --card-border: #3e3f3a;
  --input-bg: #1a1b18;
  --input-border: #3e3f3a;
  --toggle-off-bg: #555;
  --toggle-on-bg: var(--accent-green);
  --scrollbar-thumb: #555;
  --scrollbar-track: #1e1f1c;
  --mark-bg: rgba(230, 219, 116, 0.3);
  --overlay-bg: rgba(0,0,0,0.6);
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
}

:root[data-theme="light"] {
  --sidebar-bg: #f0f0e8;
  --main-bg: #fafaf0;
  --accent-pink: #d32060;
  --accent-green: #8db820;
  --accent-cyan: #4fb8d4;
  --accent-yellow: #c4b840;
  --accent-purple: #9060e0;
  --accent-orange: #d87818;
  --text-primary: #272822;
  --text-secondary: #555;
  --text-muted: #888;
  --code-bg: #f5f5e8;
  --card-bg: #fff;
  --card-border: #ddd;
  --input-bg: #fff;
  --input-border: #ccc;
  --toggle-off-bg: #bbb;
  --toggle-on-bg: var(--accent-green);
  --scrollbar-thumb: #bbb;
  --scrollbar-track: #f0f0e8;
  --mark-bg: rgba(196, 184, 64, 0.3);
  --overlay-bg: rgba(0,0,0,0.4);
  --shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--main-bg);
  color: var(--text-primary);
  line-height: 1.5;
}

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }

mark { background: var(--mark-bg); color: inherit; padding: 1px 2px; border-radius: 2px; }

/* ===== Layout ===== */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ===== Sidebar ===== */
.sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  border-right: 1px solid var(--card-border);
  z-index: 100;
}

.sidebar-header { padding: 16px 16px 8px; }
.sidebar-header h1 {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent-pink);
  letter-spacing: 1px;
}
.sidebar-header .subtitle {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.sidebar-search { padding: 8px 12px; }
.sidebar-search input {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid var(--input-border);
  border-radius: 4px;
  background: var(--input-bg);
  color: var(--text-primary);
  font-size: 0.85rem;
  outline: none;
}
.sidebar-search input:focus { border-color: var(--accent-pink); }
.sidebar-search input::placeholder { color: var(--text-muted); }

.sidebar-nav { flex: 1; overflow-y: auto; padding: 4px 0; }

.nav-group-label {
  padding: 10px 16px 4px;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  font-weight: 600;
}

.nav-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 16px 6px 24px;
  font-size: 0.85rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  user-select: none;
}
.nav-item:hover { background: rgba(249, 38, 114, 0.1); color: var(--text-primary); }
.nav-item.active { background: var(--accent-pink); color: #fff; font-weight: 600; }
.nav-item .match-count {
  font-size: 0.7rem;
  background: rgba(249, 38, 114, 0.2);
  color: var(--accent-pink);
  padding: 1px 6px;
  border-radius: 8px;
  min-width: 20px;
  text-align: center;
}
.nav-item.active .match-count { background: rgba(255,255,255,0.2); color: #fff; }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--card-border);
}

.theme-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 0.8rem;
  color: var(--text-secondary);
  user-select: none;
}
.theme-toggle-track {
  width: 36px; height: 20px;
  background: var(--toggle-off-bg);
  border-radius: 10px;
  position: relative;
  transition: background 0.2s;
}
.theme-toggle-track::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 16px; height: 16px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
}
:root[data-theme="light"] .theme-toggle-track { background: var(--accent-cyan); }
:root[data-theme="light"] .theme-toggle-track::after { transform: translateX(16px); }

/* ===== Hamburger (mobile) ===== */
.hamburger {
  display: none;
  position: fixed;
  top: 10px; left: 10px;
  z-index: 200;
  background: var(--sidebar-bg);
  border: 1px solid var(--card-border);
  border-radius: 4px;
  padding: 8px;
  cursor: pointer;
  color: var(--text-primary);
  font-size: 1.2rem;
  line-height: 1;
}
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  z-index: 99;
}

@media (max-width: 767px) {
  .hamburger { display: block; }
  .sidebar {
    position: fixed;
    left: -260px;
    top: 0; bottom: 0;
    transition: left 0.25s ease;
    box-shadow: var(--shadow);
  }
  .sidebar.open { left: 0; }
  .sidebar-overlay.open { display: block; }
  .main-content { margin-left: 0 !important; }
}

/* ===== Main Content ===== */
.main-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
}

.section-header { margin-bottom: 20px; }
.section-header h2 {
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text-primary);
}
.section-header p {
  font-size: 0.9rem;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* ===== Reference Cards ===== */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
  gap: 16px;
}
@media (max-width: 500px) { .cards-grid { grid-template-columns: 1fr; } }

.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 6px;
  padding: 16px;
  transition: border-color 0.15s;
}
.card:hover { border-color: var(--accent-pink); }

.card-title {
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 4px;
}
.card-tags { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.tag-badge {
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(174, 129, 255, 0.15);
  color: var(--accent-purple);
  font-weight: 600;
  text-transform: lowercase;
}

.code-block-wrapper {
  position: relative;
  margin: 8px 0;
}
.code-block {
  background: var(--code-bg);
  border: 1px solid var(--card-border);
  border-radius: 4px;
  padding: 10px 40px 10px 12px;
  font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
  font-size: 0.85rem;
  color: var(--accent-green);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
}
.copy-btn {
  position: absolute;
  top: 6px; right: 6px;
  background: transparent;
  border: 1px solid var(--card-border);
  border-radius: 3px;
  color: var(--text-muted);
  font-size: 0.7rem;
  padding: 3px 8px;
  cursor: pointer;
  transition: all 0.15s;
}
.copy-btn:hover { border-color: var(--accent-green); color: var(--accent-green); }
.copy-btn.copied { border-color: var(--accent-green); color: var(--accent-green); }

.card-notes {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* ===== Craft Section ===== */
.craft-container { max-width: 800px; }

.target-input-wrapper { margin-bottom: 20px; }
.target-input-wrapper label {
  font-size: 0.8rem;
  color: var(--text-muted);
  display: block;
  margin-bottom: 4px;
}
.target-input {
  width: 100%;
  padding: 10px 14px;
  font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
  font-size: 1.1rem;
  background: var(--input-bg);
  color: var(--text-primary);
  border: 2px solid var(--accent-pink);
  border-radius: 6px;
  outline: none;
}
.target-input::placeholder { color: var(--text-muted); }
.target-input:focus { box-shadow: 0 0 0 3px rgba(249, 38, 114, 0.2); }

.option-group {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 6px;
  padding: 14px;
  margin-bottom: 14px;
}
.option-group-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.option-group-label {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.compare-all-link {
  font-size: 0.7rem;
  color: var(--accent-cyan);
  cursor: pointer;
  text-decoration: none;
}
.compare-all-link:hover { text-decoration: underline; }

.pill-group { display: flex; flex-wrap: wrap; gap: 6px; }
.pill-btn {
  padding: 5px 12px;
  border: 1px solid var(--card-border);
  border-radius: 16px;
  background: transparent;
  color: var(--text-secondary);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
}
.pill-btn:hover { border-color: var(--accent-pink); color: var(--text-primary); }
.pill-btn.active {
  background: var(--accent-pink);
  border-color: var(--accent-pink);
  color: #fff;
  font-weight: 600;
}

.custom-input-wrapper {
  margin-top: 8px;
  display: none;
}
.custom-input-wrapper.visible { display: block; }
.custom-input {
  padding: 6px 10px;
  font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
  font-size: 0.85rem;
  background: var(--input-bg);
  color: var(--text-primary);
  border: 1px solid var(--input-border);
  border-radius: 4px;
  outline: none;
  width: 100%;
  max-width: 300px;
}
.custom-input:focus { border-color: var(--accent-pink); }

.toggles-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
@media (max-width: 600px) { .toggles-grid { grid-template-columns: 1fr; } }

.toggle-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 6px;
}
.toggle-item .toggle-flag {
  font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
  font-size: 0.8rem;
  color: var(--accent-pink);
  min-width: 60px;
}
.toggle-item .toggle-label {
  flex: 1;
  font-size: 0.8rem;
  color: var(--text-secondary);
}
.toggle-item .toggle-info {
  color: var(--accent-cyan);
  cursor: pointer;
  font-size: 0.85rem;
  text-decoration: none;
  flex-shrink: 0;
}
.toggle-item .toggle-info:hover { text-decoration: underline; }

.toggle-switch {
  position: relative;
  width: 36px; height: 20px;
  flex-shrink: 0;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-switch .slider {
  position: absolute;
  inset: 0;
  background: var(--toggle-off-bg);
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle-switch .slider::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 16px; height: 16px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle-switch input:checked + .slider { background: var(--accent-green); }
.toggle-switch input:checked + .slider::after { transform: translateX(16px); }

.toggle-custom-input {
  width: 100%;
  margin-top: 6px;
  display: none;
}
.toggle-custom-input.visible { display: block; }

/* Crafted command output */
.crafted-output {
  background: var(--card-bg);
  border: 2px solid var(--accent-green);
  border-radius: 8px;
  padding: 16px;
  margin-top: 20px;
  position: sticky;
  bottom: 16px;
}
.crafted-output-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.crafted-command {
  font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
  font-size: 1rem;
  padding: 12px;
  background: var(--code-bg);
  border-radius: 4px;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.6;
}
.crafted-command .cmd-tool { color: var(--text-primary); font-weight: 700; }
.crafted-command .cmd-flag { color: var(--accent-pink); }
.crafted-command .cmd-option { color: var(--accent-yellow); }
.crafted-command .cmd-timing { color: var(--accent-cyan); }
.crafted-command .cmd-target { color: var(--accent-green); }

.crafted-copy-btn {
  display: block;
  margin-top: 10px;
  padding: 10px 24px;
  background: var(--accent-green);
  color: #1e1f1c;
  font-weight: 700;
  font-size: 0.95rem;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.crafted-copy-btn:hover { opacity: 0.85; }

/* ===== Docs Section ===== */
.docs-container { max-width: 800px; }

.back-link {
  display: inline-block;
  color: var(--accent-cyan);
  font-size: 0.85rem;
  cursor: pointer;
  margin-bottom: 16px;
}
.back-link:hover { text-decoration: underline; }

.doc-entry {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 6px;
  padding: 16px;
  margin-bottom: 14px;
}
.doc-entry-flag {
  font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
  font-size: 1.2rem;
  color: var(--accent-cyan);
  font-weight: 700;
}
.doc-entry-category {
  display: inline-block;
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(174, 129, 255, 0.15);
  color: var(--accent-purple);
  font-weight: 600;
  margin-left: 8px;
  vertical-align: middle;
}
.doc-entry-title {
  font-size: 1rem;
  font-weight: 600;
  margin: 8px 0 4px;
}
.doc-entry-desc {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 12px;
  line-height: 1.6;
}

.platform-block {
  margin-bottom: 8px;
  padding: 8px 10px;
  background: var(--code-bg);
  border-radius: 4px;
  border-left: 3px solid var(--accent-orange);
}
.platform-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--accent-orange);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.platform-text {
  font-size: 0.8rem;
  color: var(--text-secondary);
}

.doc-example {
  margin: 10px 0;
}

.doc-warnings {
  margin-top: 8px;
  padding: 8px 10px;
  background: rgba(230, 219, 116, 0.1);
  border-left: 3px solid var(--accent-yellow);
  border-radius: 4px;
}
.doc-warnings-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--accent-yellow);
  margin-bottom: 4px;
}
.doc-warnings li {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-left: 16px;
}

.doc-tips {
  margin-top: 8px;
  padding: 8px 10px;
  background: rgba(102, 217, 239, 0.08);
  border-left: 3px solid var(--accent-cyan);
  border-radius: 4px;
}
.doc-tips-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--accent-cyan);
  margin-bottom: 4px;
}
.doc-tips li {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-left: 16px;
}

/* ===== Rescan History ===== */
.rescan-container { max-width: 900px; }

.env-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.env-tab {
  padding: 6px 20px;
  border: 1px solid var(--card-border);
  border-radius: 4px;
  background: transparent;
  color: var(--text-secondary);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.15s;
}
.env-tab.active {
  background: var(--accent-pink);
  border-color: var(--accent-pink);
  color: #fff;
  font-weight: 600;
}

.drop-zone {
  border: 2px dashed var(--card-border);
  border-radius: 8px;
  padding: 32px;
  text-align: center;
  color: var(--text-muted);
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 16px;
  cursor: pointer;
}
.drop-zone.dragover {
  border-color: var(--accent-pink);
  background: rgba(249, 38, 114, 0.05);
}
.drop-zone-icon { font-size: 2rem; margin-bottom: 8px; }
.drop-zone-text { font-size: 0.9rem; }
.drop-zone-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
.drop-zone input[type="file"] { display: none; }

.paste-import-area { margin-bottom: 16px; }
.paste-btn {
  padding: 6px 16px;
  border: 1px solid var(--card-border);
  border-radius: 4px;
  background: transparent;
  color: var(--text-secondary);
  font-size: 0.85rem;
  cursor: pointer;
  margin-bottom: 8px;
}
.paste-btn:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
.paste-textarea {
  display: none;
  width: 100%;
  min-height: 150px;
  padding: 10px;
  font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
  font-size: 0.8rem;
  background: var(--input-bg);
  color: var(--text-primary);
  border: 1px solid var(--input-border);
  border-radius: 4px;
  resize: vertical;
  outline: none;
}
.paste-textarea:focus { border-color: var(--accent-pink); }
.paste-textarea.visible { display: block; }
.import-btn {
  display: none;
  margin-top: 8px;
  padding: 8px 20px;
  background: var(--accent-green);
  color: #1e1f1c;
  font-weight: 700;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
.import-btn.visible { display: inline-block; }

/* Classify Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  z-index: 300;
  justify-content: center;
  align-items: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 24px;
  width: 90%;
  max-width: 480px;
  box-shadow: var(--shadow);
}
.modal h3 {
  font-size: 1.1rem;
  margin-bottom: 16px;
  color: var(--text-primary);
}
.modal-field { margin-bottom: 12px; }
.modal-field label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.modal-field input, .modal-field select {
  width: 100%;
  padding: 6px 10px;
  background: var(--input-bg);
  color: var(--text-primary);
  border: 1px solid var(--input-border);
  border-radius: 4px;
  font-size: 0.85rem;
  outline: none;
}
.modal-field input:focus, .modal-field select:focus { border-color: var(--accent-pink); }
.modal-field select { cursor: pointer; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.modal-btn-cancel {
  padding: 6px 16px;
  background: transparent;
  border: 1px solid var(--card-border);
  border-radius: 4px;
  color: var(--text-secondary);
  cursor: pointer;
}
.modal-btn-save {
  padding: 6px 16px;
  background: var(--accent-green);
  border: none;
  border-radius: 4px;
  color: #1e1f1c;
  font-weight: 700;
  cursor: pointer;
}

/* Scan Timeline */
.scan-timeline { margin-top: 16px; }
.target-group { margin-bottom: 20px; }
.target-group-header {
  font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
  font-size: 0.95rem;
  color: var(--accent-cyan);
  font-weight: 600;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--card-border);
}
.scan-entry {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 4px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.scan-entry:hover { border-color: var(--accent-pink); }
.scan-entry.selected { border-color: var(--accent-pink); background: rgba(249, 38, 114, 0.08); }
.scan-entry-select {
  width: 18px; height: 18px;
  border: 2px solid var(--card-border);
  border-radius: 3px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.scan-entry.selected .scan-entry-select { border-color: var(--accent-pink); background: var(--accent-pink); }
.scan-entry.selected .scan-entry-select::after { content: '\2713'; color: #fff; font-size: 0.7rem; }
.scan-entry-title { flex: 1; font-size: 0.85rem; }
.scan-entry-type {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(102, 217, 239, 0.15);
  color: var(--accent-cyan);
}
.scan-entry-date { font-size: 0.75rem; color: var(--text-muted); }

.compare-btn {
  display: none;
  margin-top: 12px;
  padding: 8px 20px;
  background: var(--accent-pink);
  color: #fff;
  font-weight: 700;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
.compare-btn.visible { display: inline-block; }

/* Comparison View */
.comparison-view { display: none; }
.comparison-view.visible { display: block; }
.comparison-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
.comparison-scan-info {
  font-size: 0.8rem;
  color: var(--text-secondary);
}
.comparison-scan-info strong { color: var(--text-primary); }
.comparison-summary {
  font-size: 0.8rem;
  padding: 4px 12px;
  border-radius: 12px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
}
.comparison-back {
  color: var(--accent-cyan);
  font-size: 0.85rem;
  cursor: pointer;
  margin-bottom: 12px;
  display: inline-block;
}
.comparison-back:hover { text-decoration: underline; }

.diff-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
.diff-table th {
  text-align: left;
  padding: 8px 10px;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  border-bottom: 2px solid var(--card-border);
}
.diff-table td {
  padding: 6px 10px;
  font-size: 0.85rem;
  border-bottom: 1px solid var(--card-border);
  font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
}
.diff-table tr.diff-fixed { background: rgba(166, 226, 46, 0.1); }
.diff-table tr.diff-fixed td:last-child { color: var(--accent-green); }
.diff-table tr.diff-new-issue { background: rgba(249, 38, 114, 0.1); }
.diff-table tr.diff-new-issue td:last-child { color: var(--accent-pink); }
.diff-table tr.diff-changed { background: rgba(230, 219, 116, 0.1); }
.diff-table tr.diff-changed td:last-child { color: var(--accent-yellow); }
.diff-table tr.diff-same td { color: var(--text-muted); }

.raw-diff { display: flex; gap: 16px; margin-top: 16px; }
.raw-diff-pane {
  flex: 1;
  overflow-x: auto;
}
.raw-diff-pane pre {
  font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
  font-size: 0.75rem;
  background: var(--code-bg);
  padding: 12px;
  border-radius: 4px;
  border: 1px solid var(--card-border);
  white-space: pre-wrap;
  word-break: break-all;
}
.raw-diff-pane .diff-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.diff-line-added { color: var(--accent-pink); }
.diff-line-removed { color: var(--accent-green); }
.diff-line-changed { color: var(--accent-yellow); }
.diff-line-same { color: var(--text-muted); }

/* ===== Empty State ===== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty-state-text { font-size: 1rem; }
.empty-state-sub { font-size: 0.8rem; margin-top: 6px; }

/* ===== Search Results ===== */
.search-results-section { margin-bottom: 24px; }
.search-results-section h3 {
  font-size: 1rem;
  color: var(--accent-pink);
  margin-bottom: 10px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--card-border);
}

/* ===== Utility ===== */
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">
  <!-- Hamburger (mobile) -->
  <button class="hamburger" id="hamburger" aria-label="Open menu">&#9776;</button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>ScanRef</h1>
      <div class="subtitle">Command Reference &amp; Scanner</div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Search... ( / )" aria-label="Search">
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Auto-generated from data -->
    </nav>
    <div class="sidebar-footer">
      <div class="theme-toggle" id="themeToggle">
        <div class="theme-toggle-track"></div>
        <span id="themeLabel">Dark</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <!-- Dynamic content rendered here -->
  </main>
</div>

<!-- Classify Modal -->
<div class="modal-overlay" id="classifyModal">
  <div class="modal">
    <h3>Classify Scan Result</h3>
    <div class="modal-field">
      <label for="modalTitle">Title (required)</label>
      <input type="text" id="modalTitle" placeholder="e.g. Prod Web Server - Initial Scan">
    </div>
    <div class="modal-field">
      <label for="modalEnv">Environment</label>
      <select id="modalEnv">
        <option value="Prod">Prod</option>
        <option value="UAT">UAT</option>
      </select>
    </div>
    <div class="modal-field">
      <label for="modalTarget">Target</label>
      <input type="text" id="modalTarget" placeholder="Auto-detected from output">
    </div>
    <div class="modal-field">
      <label for="modalTimestamp">Timestamp</label>
      <input type="datetime-local" id="modalTimestamp">
    </div>
    <div class="modal-field">
      <label for="modalScanType">Scan Type (auto-detected)</label>
      <select id="modalScanType">
        <option value="nmap-port">nmap Port Scan</option>
        <option value="nmap-script">nmap Script Scan</option>
        <option value="curl-headers">curl Headers</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-btn-cancel" id="modalCancel">Cancel</button>
      <button class="modal-btn-save" id="modalSave">Save</button>
    </div>
  </div>
</div>

<script>
/* ================================================================
   DATA -- Empty placeholders, populated in subsequent tasks
   ================================================================ */

const commands = [];

const craftTools = {};

const docs = {};

/* ================================================================
   STATE
   ================================================================ */

let activeSection = null;      // { type: 'reference'|'craft'|'docs'|'rescan', key: string }
let previousSection = null;
let searchQuery = '';
let searchTimeout = null;

// Craft state per tool
let craftState = {};

// Rescan history state
let rescanEnv = 'Prod';
let rescanEntries = [];
let rescanSelected = [];
let rescanComparing = false;
let pendingImportRaw = '';
let pendingImportParsed = null;

/* ================================================================
   UTILITY FUNCTIONS
   ================================================================ */

function generateId() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    var r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function escapeHtml(str) {
  if (str == null) return '';
  var div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

function copyToClipboard(text, btn) {
  function fallbackCopy() {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
  }

  function onSuccess() {
    if (btn) {
      var orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(function() { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
    }
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(function() {
      fallbackCopy();
      onSuccess();
    });
  } else {
    fallbackCopy();
    onSuccess();
  }
}

function highlightText(text, query) {
  if (!query) return escapeHtml(text);
  var escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  var re = new RegExp('(' + escaped + ')', 'gi');
  return escapeHtml(text).replace(re, '<mark>$1</mark>');
}

function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function formatDate(iso) {
  try {
    var d = new Date(iso);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } catch(e) { return iso; }
}

/* ================================================================
   THEME
   ================================================================ */

function initTheme() {
  var saved = localStorage.getItem('scanref-theme');
  var theme = saved || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeLabel();
}

function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme');
  var next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('scanref-theme', next);
  updateThemeLabel();
}

function updateThemeLabel() {
  var label = document.getElementById('themeLabel');
  if (label) {
    label.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? 'Dark' : 'Light';
  }
}

/* ================================================================
   SIDEBAR NAVIGATION
   ================================================================ */

function buildSidebar() {
  var nav = document.getElementById('sidebarNav');
  var html = '';

  // Reference sections
  var refSections = [];
  commands.forEach(function(c) {
    if (refSections.indexOf(c.section) === -1) refSections.push(c.section);
  });
  if (refSections.length > 0) {
    html += '<div class="nav-group-label">Reference</div>';
    refSections.forEach(function(s) {
      html += '<div class="nav-item" data-type="reference" data-key="' + escapeHtml(s) + '">' +
        '<span class="nav-item-label">' + escapeHtml(s) + '</span></div>';
    });
  }

  // Craft tools
  var craftKeys = Object.keys(craftTools);
  if (craftKeys.length > 0) {
    html += '<div class="nav-group-label">Craft</div>';
    craftKeys.forEach(function(k) {
      html += '<div class="nav-item" data-type="craft" data-key="' + escapeHtml(k) + '">' +
        '<span class="nav-item-label">' + escapeHtml(craftTools[k].name || k) + '</span></div>';
    });
  }

  // Docs
  var docKeys = Object.keys(docs);
  if (docKeys.length > 0) {
    html += '<div class="nav-group-label">Docs</div>';
    docKeys.forEach(function(k) {
      html += '<div class="nav-item" data-type="docs" data-key="' + escapeHtml(k) + '">' +
        '<span class="nav-item-label">' + escapeHtml(k) + ' Reference</span></div>';
    });
  }

  // Rescan History
  html += '<div class="nav-group-label">History</div>';
  html += '<div class="nav-item" data-type="rescan" data-key="rescan">' +
    '<span class="nav-item-label">Rescan History</span></div>';

  nav.innerHTML = html;

  // Attach click handlers
  var items = nav.querySelectorAll('.nav-item');
  for (var i = 0; i < items.length; i++) {
    (function(item) {
      item.addEventListener('click', function() {
        var type = item.getAttribute('data-type');
        var key = item.getAttribute('data-key');
        navigateTo({ type: type, key: key });
        closeMobileSidebar();
      });
    })(items[i]);
  }
}

function updateSidebarActive() {
  var items = document.querySelectorAll('.nav-item');
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var type = item.getAttribute('data-type');
    var key = item.getAttribute('data-key');
    var isActive = activeSection && activeSection.type === type && activeSection.key === key;
    if (isActive) item.classList.add('active');
    else item.classList.remove('active');
  }
}

function updateSidebarMatchCounts(counts) {
  var items = document.querySelectorAll('.nav-item');
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var type = item.getAttribute('data-type');
    var key = item.getAttribute('data-key');
    var countKey = type + ':' + key;
    var existing = item.querySelector('.match-count');
    if (existing) existing.remove();
    if (counts && counts[countKey] !== undefined) {
      var span = document.createElement('span');
      span.className = 'match-count';
      span.textContent = counts[countKey];
      item.appendChild(span);
    }
  }
}

/* ================================================================
   NAVIGATION
   ================================================================ */

function navigateTo(section, scrollToId) {
  previousSection = activeSection;
  activeSection = section;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  updateSidebarActive();
  updateSidebarMatchCounts(null);
  renderMainContent(scrollToId);
}

function renderMainContent(scrollToId) {
  var main = document.getElementById('mainContent');

  if (!activeSection) {
    main.innerHTML = renderEmptyState('Select a section from the sidebar', 'Or press / to search');
    return;
  }

  switch (activeSection.type) {
    case 'reference':
      renderReferenceSection(main, activeSection.key);
      break;
    case 'craft':
      renderCraftSection(main, activeSection.key);
      break;
    case 'docs':
      renderDocsSection(main, activeSection.key, scrollToId);
      break;
    case 'rescan':
      renderRescanSection(main);
      break;
    default:
      main.innerHTML = renderEmptyState('Unknown section type');
  }

  if (scrollToId) {
    setTimeout(function() {
      var el = document.getElementById(scrollToId);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
}

function renderEmptyState(text, sub) {
  return '<div class="empty-state">' +
    '<div class="empty-state-text">' + escapeHtml(text) + '</div>' +
    (sub ? '<div class="empty-state-sub">' + escapeHtml(sub) + '</div>' : '') +
    '</div>';
}

/* ================================================================
   REFERENCE SECTION RENDERER
   ================================================================ */

function renderReferenceSection(container, sectionName) {
  var items = commands.filter(function(c) { return c.section === sectionName; });
  if (items.length === 0) {
    container.innerHTML = '<div class="section-header"><h2>' + escapeHtml(sectionName) +
      '</h2><p>No commands yet. Add entries to the commands array.</p></div>' +
      renderEmptyState('No commands in this section');
    return;
  }

  var html = '<div class="section-header"><h2>' + escapeHtml(sectionName) + '</h2><p>' +
    items.length + ' command' + (items.length !== 1 ? 's' : '') + '</p></div>';
  html += '<div class="cards-grid">';
  items.forEach(function(cmd, i) { html += renderCommandCard(cmd, i); });
  html += '</div>';
  container.innerHTML = html;
  attachCopyHandlers(container);
}

function renderCommandCard(cmd, idx) {
  var q = searchQuery;
  var tagsHtml = '';
  (cmd.tags || []).forEach(function(t) {
    tagsHtml += '<span class="tag-badge">' + highlightText(t, q) + '</span>';
  });

  return '<div class="card">' +
    '<div class="card-title">' + highlightText(cmd.title, q) + '</div>' +
    '<div class="card-tags"><span class="tag-badge">' + escapeHtml(cmd.section) + '</span>' + tagsHtml + '</div>' +
    '<div class="code-block-wrapper">' +
    '<pre class="code-block">' + highlightText(cmd.cmd, q) + '</pre>' +
    '<button class="copy-btn" data-copy="' + escapeHtml(cmd.cmd) + '">Copy</button>' +
    '</div>' +
    (cmd.notes ? '<div class="card-notes">' + highlightText(cmd.notes, q) + '</div>' : '') +
    '</div>';
}

function attachCopyHandlers(container) {
  var btns = container.querySelectorAll('.copy-btn');
  for (var i = 0; i < btns.length; i++) {
    (function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        copyToClipboard(btn.getAttribute('data-copy'), btn);
      });
    })(btns[i]);
  }
  var craftBtns = container.querySelectorAll('.crafted-copy-btn');
  for (var j = 0; j < craftBtns.length; j++) {
    (function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        copyToClipboard(btn.getAttribute('data-copy'), btn);
      });
    })(craftBtns[j]);
  }
}

/* ================================================================
   CRAFT SECTION RENDERER
   ================================================================ */

function getCraftState(toolKey) {
  if (!craftState[toolKey]) {
    var tool = craftTools[toolKey];
    if (!tool) return null;
    var state = { target: '', groups: {}, toggles: {}, customInputs: {} };
    (tool.groups || []).forEach(function(g) {
      var defaultIdx = -1;
      g.options.forEach(function(o, i) { if (o.default) defaultIdx = i; });
      state.groups[g.name] = defaultIdx;
    });
    (tool.toggles || []).forEach(function(t) {
      state.toggles[t.flag] = false;
    });
    craftState[toolKey] = state;
  }
  return craftState[toolKey];
}

function buildCraftedCommand(toolKey) {
  var tool = craftTools[toolKey];
  var state = getCraftState(toolKey);
  if (!tool || !state) return '';

  var parts = [tool.name || toolKey];

  (tool.groups || []).forEach(function(g) {
    var selIdx = state.groups[g.name];
    if (selIdx >= 0 && selIdx < g.options.length) {
      var opt = g.options[selIdx];
      if (opt.flag) {
        var flag = opt.flag;
        if (opt.customInput && state.customInputs[opt.flag]) {
          flag += ' ' + state.customInputs[opt.flag];
        }
        parts.push(flag);
      }
    }
  });

  (tool.toggles || []).forEach(function(t) {
    if (state.toggles[t.flag]) {
      var flag = t.flag;
      if (t.customInput && state.customInputs[t.flag]) {
        flag += ' ' + state.customInputs[t.flag];
      }
      parts.push(flag);
    }
  });

  if (state.target) {
    parts.push(state.target);
  }

  return parts.join(' ');
}

function colorCodeCommand(toolKey) {
  var tool = craftTools[toolKey];
  var state = getCraftState(toolKey);
  if (!tool || !state) return '';

  var html = '<span class="cmd-tool">' + escapeHtml(tool.name || toolKey) + '</span>';

  (tool.groups || []).forEach(function(g) {
    var selIdx = state.groups[g.name];
    if (selIdx >= 0 && selIdx < g.options.length) {
      var opt = g.options[selIdx];
      if (opt.flag) {
        var isTimingFlag = /^-T\d/.test(opt.flag);
        var cls = isTimingFlag ? 'cmd-timing' : 'cmd-flag';
        html += ' <span class="' + cls + '">' + escapeHtml(opt.flag) + '</span>';
        if (opt.customInput && state.customInputs[opt.flag]) {
          html += ' <span class="cmd-option">' + escapeHtml(state.customInputs[opt.flag]) + '</span>';
        }
      }
    }
  });

  (tool.toggles || []).forEach(function(t) {
    if (state.toggles[t.flag]) {
      html += ' <span class="cmd-flag">' + escapeHtml(t.flag) + '</span>';
      if (t.customInput && state.customInputs[t.flag]) {
        html += ' <span class="cmd-option">' + escapeHtml(state.customInputs[t.flag]) + '</span>';
      }
    }
  });

  if (state.target) {
    html += ' <span class="cmd-target">' + escapeHtml(state.target) + '</span>';
  }

  return html;
}

function renderCraftSection(container, toolKey) {
  var tool = craftTools[toolKey];
  if (!tool) {
    container.innerHTML = '<div class="section-header"><h2>Craft: ' + escapeHtml(toolKey) +
      '</h2><p>Tool not configured yet.</p></div>' + renderEmptyState('Add this tool to craftTools object');
    return;
  }

  var state = getCraftState(toolKey);
  var html = '<div class="craft-container">';
  html += '<div class="section-header"><h2>' + escapeHtml(tool.name || toolKey) + '</h2>' +
    '<p>' + escapeHtml(tool.description || '') + '</p></div>';

  // Target input
  html += '<div class="target-input-wrapper">' +
    '<label>Target</label>' +
    '<input type="text" class="target-input" id="craftTarget" value="' + escapeHtml(state.target) +
    '" placeholder="' + escapeHtml(tool.targetPlaceholder || 'Enter target') + '">' +
    '</div>';

  // Option groups
  (tool.groups || []).forEach(function(g, gi) {
    html += '<div class="option-group">' +
      '<div class="option-group-header">' +
      '<span class="option-group-label">' + escapeHtml(g.name) + '</span>' +
      '<span class="compare-all-link" data-tool="' + escapeHtml(toolKey) + '" data-group="' + escapeHtml(g.name) + '">Compare all &rarr;</span>' +
      '</div><div class="pill-group">';

    g.options.forEach(function(opt, oi) {
      var isActive = state.groups[g.name] === oi;
      html += '<button class="pill-btn' + (isActive ? ' active' : '') + '" data-group="' + escapeHtml(g.name) +
        '" data-index="' + oi + '">' + escapeHtml(opt.label) + '</button>';
    });
    html += '</div>';

    // Custom inputs
    g.options.forEach(function(opt, oi) {
      if (opt.customInput) {
        var visible = state.groups[g.name] === oi;
        html += '<div class="custom-input-wrapper' + (visible ? ' visible' : '') + '" data-group="' + escapeHtml(g.name) +
          '" data-index="' + oi + '">' +
          '<input type="text" class="custom-input" data-flag="' + escapeHtml(opt.flag) +
          '" placeholder="' + escapeHtml(opt.placeholder || '') +
          '" value="' + escapeHtml(state.customInputs[opt.flag] || '') + '">' +
          '</div>';
      }
    });
    html += '</div>';
  });

  // Toggles
  if ((tool.toggles || []).length > 0) {
    html += '<div class="option-group"><div class="option-group-header"><span class="option-group-label">Options</span></div>' +
      '<div class="toggles-grid">';
    tool.toggles.forEach(function(t, ti) {
      var isOn = state.toggles[t.flag];
      html += '<div class="toggle-item">' +
        '<span class="toggle-flag">' + escapeHtml(t.flag) + '</span>' +
        '<span class="toggle-label">' + escapeHtml(t.label) + '</span>' +
        (t.docId ? '<span class="toggle-info" data-docid="' + escapeHtml(t.docId) + '" data-tool="' + escapeHtml(toolKey) + '" title="View docs">&#9432;</span>' : '') +
        '<label class="toggle-switch">' +
        '<input type="checkbox" data-flag="' + escapeHtml(t.flag) + '"' + (isOn ? ' checked' : '') + '>' +
        '<span class="slider"></span></label></div>';
      if (t.customInput) {
        html += '<div class="toggle-custom-input' + (isOn ? ' visible' : '') + '" data-toggle-flag="' + escapeHtml(t.flag) + '">' +
          '<input type="text" class="custom-input" data-flag="' + escapeHtml(t.flag) +
          '" placeholder="' + escapeHtml(t.placeholder || '') +
          '" value="' + escapeHtml(state.customInputs[t.flag] || '') + '"></div>';
      }
    });
    html += '</div></div>';
  }

  // Crafted command output
  html += '<div class="crafted-output">' +
    '<div class="crafted-output-label">Crafted Command</div>' +
    '<div class="crafted-command" id="craftedPreview">' + colorCodeCommand(toolKey) + '</div>' +
    '<button class="crafted-copy-btn" id="craftedCopyBtn" data-copy="' + escapeHtml(buildCraftedCommand(toolKey)) + '">Copy Command</button>' +
    '</div>';

  html += '</div>';
  container.innerHTML = html;
  attachCraftHandlers(container, toolKey);
}

function attachCraftHandlers(container, toolKey) {
  var tool = craftTools[toolKey];
  var state = getCraftState(toolKey);

  function updateOutput() {
    var preview = document.getElementById('craftedPreview');
    var copyBtn = document.getElementById('craftedCopyBtn');
    if (preview) preview.innerHTML = colorCodeCommand(toolKey);
    if (copyBtn) copyBtn.setAttribute('data-copy', buildCraftedCommand(toolKey));
  }

  // Target input
  var targetInput = container.querySelector('#craftTarget');
  if (targetInput) {
    targetInput.addEventListener('input', function() {
      state.target = targetInput.value;
      updateOutput();
    });
  }

  // Pill buttons
  var pills = container.querySelectorAll('.pill-btn');
  for (var i = 0; i < pills.length; i++) {
    (function(btn) {
      btn.addEventListener('click', function() {
        var groupName = btn.getAttribute('data-group');
        var index = parseInt(btn.getAttribute('data-index'));
        state.groups[groupName] = index;
        var groupPills = container.querySelectorAll('.pill-btn[data-group="' + groupName + '"]');
        for (var j = 0; j < groupPills.length; j++) {
          if (parseInt(groupPills[j].getAttribute('data-index')) === index) groupPills[j].classList.add('active');
          else groupPills[j].classList.remove('active');
        }
        var wrappers = container.querySelectorAll('.custom-input-wrapper[data-group="' + groupName + '"]');
        for (var k = 0; k < wrappers.length; k++) {
          if (parseInt(wrappers[k].getAttribute('data-index')) === index) wrappers[k].classList.add('visible');
          else wrappers[k].classList.remove('visible');
        }
        updateOutput();
      });
    })(pills[i]);
  }

  // Custom inputs (pill groups)
  var customInputs = container.querySelectorAll('.custom-input-wrapper .custom-input');
  for (var ci = 0; ci < customInputs.length; ci++) {
    (function(inp) {
      inp.addEventListener('input', function() {
        state.customInputs[inp.getAttribute('data-flag')] = inp.value;
        updateOutput();
      });
    })(customInputs[ci]);
  }

  // Toggle switches
  var toggleInputs = container.querySelectorAll('.toggle-switch input');
  for (var ti = 0; ti < toggleInputs.length; ti++) {
    (function(chk) {
      chk.addEventListener('change', function() {
        var flag = chk.getAttribute('data-flag');
        state.toggles[flag] = chk.checked;
        var wrapper = container.querySelector('.toggle-custom-input[data-toggle-flag="' + flag + '"]');
        if (wrapper) {
          if (chk.checked) wrapper.classList.add('visible');
          else wrapper.classList.remove('visible');
        }
        updateOutput();
      });
    })(toggleInputs[ti]);
  }

  // Toggle custom inputs
  var toggleCustomInputs = container.querySelectorAll('.toggle-custom-input .custom-input');
  for (var tci = 0; tci < toggleCustomInputs.length; tci++) {
    (function(inp) {
      inp.addEventListener('input', function() {
        state.customInputs[inp.getAttribute('data-flag')] = inp.value;
        updateOutput();
      });
    })(toggleCustomInputs[tci]);
  }

  // Info icons -> docs
  var infoIcons = container.querySelectorAll('.toggle-info');
  for (var ii = 0; ii < infoIcons.length; ii++) {
    (function(info) {
      info.addEventListener('click', function() {
        var docId = info.getAttribute('data-docid');
        var toolName = info.getAttribute('data-tool');
        navigateTo({ type: 'docs', key: toolName }, docId);
      });
    })(infoIcons[ii]);
  }

  // Compare all links
  var compareLinks = container.querySelectorAll('.compare-all-link');
  for (var cl = 0; cl < compareLinks.length; cl++) {
    (function(link) {
      link.addEventListener('click', function() {
        navigateTo({ type: 'docs', key: link.getAttribute('data-tool') });
      });
    })(compareLinks[cl]);
  }

  attachCopyHandlers(container);
}

   DOCS SECTION RENDERER

function renderDocsSection(container, toolKey, scrollToId) {
  var entries = docs[toolKey];
  if (!entries || entries.length === 0) {
    container.innerHTML = '<div class="section-header"><h2>' + escapeHtml(toolKey) +
      ' Reference</h2><p>No documentation yet.</p></div>' + renderEmptyState('Add entries to the docs object');
    return;
  }

  var q = searchQuery;
  var html = '<div class="docs-container">';

  // Back link
  if (craftTools[toolKey]) {
    html += '<span class="back-link" id="backToCraft" data-tool="' + escapeHtml(toolKey) +
      '">&larr; Back to ' + escapeHtml(toolKey) + ' Craft</span>';
  }

  html += '<div class="section-header"><h2>' + escapeHtml(toolKey) + ' Reference</h2>' +
    '<p>' + entries.length + ' entries</p></div>';

  entries.forEach(function(entry) {
    html += '<div class="doc-entry" id="' + escapeHtml(entry.id || '') + '">' +
      '<span class="doc-entry-flag">' + highlightText(entry.flag, q) + '</span>' +

    // Platform blocks
    if (entry.platforms) {
      if (entry.platforms.linux) {
        html += '<div class="platform-block"><div class="platform-label">Linux</div>' +
          '<div class="platform-text">' + highlightText(entry.platforms.linux, q) + '</div></div>';
      }
      if (entry.platforms.windows) {
        html += '<div class="platform-block"><div class="platform-label">Windows CMD</div>' +
          '<div class="platform-text">' + highlightText(entry.platforms.windows, q) + '</div></div>';
      }
      if (entry.platforms.powershell) {
        html += '<div class="platform-block"><div class="platform-label">PowerShell</div>' +
          '<div class="platform-text">' + highlightText(entry.platforms.powershell, q) + '</div></div>';
      }
    }

    // Example
    if (entry.example) {
      html += '<div class="doc-example"><div class="code-block-wrapper">' +
        '<pre class="code-block">' + highlightText(entry.example, q) + '</pre>' +
        '<button class="copy-btn" data-copy="' + escapeHtml(entry.example) + '">Copy</button>' +
        '</div></div>';
    }

    // Warnings
    if (entry.warnings && entry.warnings.length > 0) {
      html += '<div class="doc-warnings"><div class="doc-warnings-label">Warnings</div><ul>';

      html += '</ul></div>';

    // Tips

  html += '</div>';

  // Back link handler
  var backLink = container.querySelector('#backToCraft');
