function renderDocsSection(container, toolKey, scrollToId) {
  var entries = docs[toolKey];
  if (!entries || entries.length === 0) {
    container.innerHTML = '<div class="section-header"><div class="section-prompt"># <span class="cmd">scanref</span> <span class="flag">--docs</span> <span class="arg">' + escapeHtml(toolKey) + '</span></div><h2>' + escapeHtml(toolKey) + ' Reference</h2><p>No documentation yet.</p></div>' + renderEmptyState('Add entries to the docs object');
    return;
  }

  // Group entries by category (preserve order)
  var catOrder = [];
  var catMap = {};
  entries.forEach(function(e) {
    var cat = e.category || 'Other';
    if (!catMap[cat]) {
      catOrder.push(cat);
      catMap[cat] = [];
    }
    catMap[cat].push(e);
  });

  var q = searchQuery;
  var html = '<div class="docs-container">';

  // Back link
  if (craftTools[toolKey]) {
    html += '<span class="back-link" id="backToCraft" data-tool="' + escapeHtml(toolKey) +
      '">&larr; Back to ' + escapeHtml(toolKey) + ' Craft</span>';
  }

  html += '<div class="section-header"><div class="section-prompt"># <span class="cmd">scanref</span> <span class="flag">--docs</span> <span class="arg">' + escapeHtml(toolKey) + '</span></div><h2>' + escapeHtml(toolKey) + ' Reference</h2>' +
    '<p>' + entries.length + ' entries across ' + catOrder.length + ' categories</p></div>';

  // Render grouped by category
  catOrder.forEach(function(cat) {
    var catId = 'doc-cat-' + toolKey + '-' + cat.replace(/[^a-zA-Z0-9]/g, '-');
    html += '<div class="doc-category-group" id="' + escapeHtml(catId) + '">';
    html += '<div class="doc-category-header">' +
      '<span class="doc-category-title">' + escapeHtml(cat) + '</span>' +
      '<span class="doc-category-count">' + catMap[cat].length + '</span></div>';

    html += '<div class="doc-entries-grid">';
    catMap[cat].forEach(function(entry) {
      html += '<div class="doc-entry" id="' + escapeHtml(entry.id || '') + '">' +
        '<div class="doc-entry-header">' +
        '<span class="doc-entry-chevron">&#9654;</span>' +
        '<div class="doc-entry-header-main">' +
        '<span class="doc-entry-flag">' + highlightText(entry.flag, q) + '</span>' +
        '<span class="doc-entry-title">' + highlightText(entry.title, q) + '</span>' +
        '</div></div>' +
        '<div class="doc-entry-body">' +
        '<div class="doc-entry-desc">' + highlightText(entry.description || '', q) + '</div>';

      // Platform blocks
      if (entry.platforms) {
        if (entry.platforms.linux) {
          html += '<div class="platform-block"><div class="platform-label">Linux</div>' +
            '<div class="platform-text">' + highlightText(entry.platforms.linux, q) + '</div></div>';
        }
        if (entry.platforms.windows) {
          html += '<div class="platform-block"><div class="platform-label">Windows CMD</div>' +
            '<div class="platform-text">' + highlightText(entry.platforms.windows, q) + '</div></div>';
        }
        if (entry.platforms.powershell) {
          html += '<div class="platform-block"><div class="platform-label">PowerShell</div>' +
            '<div class="platform-text">' + highlightText(entry.platforms.powershell, q) + '</div></div>';
        }
      }

      // Example
      if (entry.example) {
        html += '<div class="doc-example"><div class="code-block-wrapper">' +
          '<pre class="code-block">' + highlightText(entry.example, q) + '</pre>' +
          '<button class="copy-btn" data-copy="' + escapeHtml(entry.example) + '">Copy</button>' +
          '</div></div>';
      }

      // Warnings
      if (entry.warnings && entry.warnings.length > 0) {
        html += '<div class="doc-warnings"><div class="doc-warnings-label">Warnings</div><ul>';
        entry.warnings.forEach(function(w) { html += '<li>' + highlightText(w, q) + '</li>'; });
        html += '</ul></div>';
      }

      // Tips
      if (entry.tips && entry.tips.length > 0) {
        html += '<div class="doc-tips"><div class="doc-tips-label">Tips</div><ul>';
        entry.tips.forEach(function(t) { html += '<li>' + highlightText(t, q) + '</li>'; });
        html += '</ul></div>';
      }

      if (entry.docUrl) {
        html += '<a class="card-doc-link" href="' + escapeHtml(entry.docUrl) + '" target="_blank" rel="noopener">&#9656; official docs</a>';
      }

      html += '</div></div>'; // .doc-entry-body + .doc-entry
    });

    html += '</div>'; // .doc-entries-grid
    html += '</div>'; // .doc-category-group
  });

  html += '</div>';
  container.innerHTML = html;

  // Back link handler
  var backLink = container.querySelector('#backToCraft');
  if (backLink) {
    backLink.addEventListener('click', function() {
      navigateTo({ type: 'craft', key: backLink.getAttribute('data-tool') });
    });
  }

  attachCopyHandlers(container);

  // Doc entry expand/collapse handlers
  var docEntries = container.querySelectorAll('.doc-entry');
  for (var di = 0; di < docEntries.length; di++) {
    (function(entry) {
      var header = entry.querySelector('.doc-entry-header');
      if (header) {
        header.addEventListener('click', function() { entry.classList.toggle('expanded'); });
      }
    })(docEntries[di]);
  }

  // Scroll to category anchor and expand its entries if requested
  if (scrollToId) {
    var target = document.getElementById(scrollToId);
    if (target) {
      if (target.classList.contains('doc-entry')) {
        target.classList.add('expanded');
      } else {
        var entries = target.querySelectorAll('.doc-entry');
        for (var ei = 0; ei < entries.length; ei++) {
          entries[ei].classList.add('expanded');
        }
      }
      setTimeout(function() { target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 10);
    }
  }
}

/* ================================================================
   RESCAN HISTORY SECTION RENDERER
   ================================================================ */

function renderRescanSection(container) {
  var html = '<div class="rescan-container">';
  html += '<div class="section-header"><div class="section-prompt"># <span class="cmd">scanref</span> <span class="flag">--history</span></div><h2>Rescan History</h2>' +
    '<p>Track scan results over time and compare changes</p></div>';

  // Env tabs
  html += '<div class="env-tabs">' +
    '<button class="env-tab' + (rescanEnv === 'Prod' ? ' active' : '') + '" data-env="Prod">Prod</button>' +
    '<button class="env-tab' + (rescanEnv === 'UAT' ? ' active' : '') + '" data-env="UAT">UAT</button>' +
    '</div>';

  // Comparison view or normal view
  if (rescanComparing === 'matrix' && rescanSelected.length >= 2) {
    html += renderMatrixView();
  } else if (rescanComparing && rescanSelected.length === 2) {
    html += renderComparisonView();
  } else {
    // Drop zone
    html += '<div class="drop-zone" id="dropZone">' +
      '<div class="drop-zone-icon">&#128230;</div>' +
      '<div class="drop-zone-text">Drag &amp; drop JSON history files here</div>' +
      '<div class="drop-zone-sub">or click to browse</div>' +
      '<input type="file" id="fileInput" accept=".json" multiple>' +
      '</div>';

    // Paste import
    html += '<div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:8px;"><span style="color:var(--accent-cyan);">tip:</span> pipe scan output to clipboard: <span style="color:var(--accent-green);">nmap -sV target | clip.exe</span> &mdash; then paste below</div>';
    html += '<div class="paste-import-area">' +
      '<button class="paste-btn" id="pasteBtn">Paste scan output</button>' +
      '<textarea class="paste-textarea" id="pasteArea" placeholder="Paste raw nmap or curl output here..."></textarea>' +
      '<button class="import-btn" id="importBtn">Import</button>' +
      '</div>';

    // Scan timeline
    html += renderScanTimeline();

    // Compare, matrix & export buttons
    html += '<div style="display:flex;gap:8px;margin-top:14px;align-items:center;flex-wrap:wrap;">';
    html += '<button class="compare-btn' + (rescanSelected.length === 2 ? ' visible' : '') +
      '" id="compareBtn">Compare Selected (' + rescanSelected.length + '/2)</button>';
    var canMatrix = rescanSelected.length >= 2 && (function() {
      var types = {};
      rescanEntries.forEach(function(e) {
        if (rescanSelected.indexOf(e.id) >= 0) types[e.scanType] = true;
      });
      return Object.keys(types).length === 1;
    })();
    html += '<button class="compare-btn' + (canMatrix ? ' visible' : '') +
      '" id="matrixBtn"' + (!canMatrix && rescanSelected.length >= 2 ? ' title="Select same scan type for matrix view"' : '') +
      '>Matrix View (' + rescanSelected.length + ')</button>';
    if (rescanEntries.some(function(e) { return e.environment === rescanEnv; })) {
      html += '<button class="audit-btn-clear" id="rescanExportBtn">Export JSON</button>';
    }
    html += '</div>';
  }

  html += '</div>';
  container.innerHTML = html;
  attachRescanHandlers(container);
}

function renderScanTimeline() {
  var envEntries = rescanEntries.filter(function(e) { return e.environment === rescanEnv; });
  if (envEntries.length === 0) {
    return '<div class="scan-timeline"><div class="empty-state">' +
      '<div class="empty-state-text">No scans loaded for ' + escapeHtml(rescanEnv) + '</div>' +
      '<div class="empty-state-sub">Drop JSON files above or paste scan output</div>' +
      '</div></div>';
  }

  // Group by target
  var groups = {};
  envEntries.forEach(function(e) {
    var target = e.target || 'Unknown';
    if (!groups[target]) groups[target] = [];
    groups[target].push(e);
  });

  // Sort each group by timestamp
  Object.keys(groups).forEach(function(k) {
    groups[k].sort(function(a, b) { return new Date(a.timestamp) - new Date(b.timestamp); });
  });

  var html = '<div class="scan-timeline">';
  Object.keys(groups).forEach(function(target) {
    var scans = groups[target];
    html += '<div class="target-group">' +
      '<div class="target-group-header">' + escapeHtml(target) + '</div>' +
      '<div class="target-group-entries">';
    scans.forEach(function(scan) {
      var selected = rescanSelected.indexOf(scan.id) >= 0;
      html += '<div class="scan-entry' + (selected ? ' selected' : '') + '" data-id="' + escapeHtml(scan.id) + '">' +
        '<div class="scan-entry-select"></div>' +
        '<span class="scan-entry-title">' + escapeHtml(scan.title) + '</span>' +
        '<span class="scan-entry-type">' + escapeHtml(scan.scanType) + '</span>' +
        '<span class="scan-entry-date">' + formatDate(scan.timestamp) + '</span>' +
        '</div>';
    });
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function attachRescanHandlers(container) {
  // Env tabs
  var tabs = container.querySelectorAll('.env-tab');
  for (var i = 0; i < tabs.length; i++) {
    (function(tab) {
      tab.addEventListener('click', function() {
        rescanEnv = tab.getAttribute('data-env');
        rescanSelected = [];
        rescanComparing = false;
        renderRescanSection(container);
      });
    })(tabs[i]);
  }

  // Drop zone
  var dropZone = container.querySelector('#dropZone');
  var fileInput = container.querySelector('#fileInput');
  if (dropZone && fileInput) {
    dropZone.addEventListener('click', function() { fileInput.click(); });
    dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
    dropZone.addEventListener('drop', function(e) {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleFilesDrop(e.dataTransfer.files, container);
    });
    fileInput.addEventListener('change', function() { handleFilesDrop(fileInput.files, container); });
  }

  // Paste button
  var pasteBtn = container.querySelector('#pasteBtn');
  var pasteArea = container.querySelector('#pasteArea');
  var importBtn = container.querySelector('#importBtn');
  if (pasteBtn && pasteArea && importBtn) {
    pasteBtn.addEventListener('click', function() {
      pasteArea.classList.toggle('visible');
      importBtn.classList.toggle('visible', pasteArea.classList.contains('visible'));
    });
    importBtn.addEventListener('click', function() {
      var raw = pasteArea.value.trim();
      if (!raw) return;
      handlePasteImport(raw, container);
    });
  }

  // Scan entries
  var scanEntries = container.querySelectorAll('.scan-entry');
  for (var j = 0; j < scanEntries.length; j++) {
    (function(entry) {
      entry.addEventListener('click', function() {
        var id = entry.getAttribute('data-id');
        var idx = rescanSelected.indexOf(id);
        if (idx >= 0) {
          rescanSelected.splice(idx, 1);
          entry.classList.remove('selected');
        } else {
          rescanSelected.push(id);
          entry.classList.add('selected');
        }
        var cBtn = container.querySelector('#compareBtn');
        if (cBtn) {
          cBtn.textContent = 'Compare Selected (' + rescanSelected.length + '/2)';
          if (rescanSelected.length === 2) cBtn.classList.add('visible');
          else cBtn.classList.remove('visible');
        }
        var mBtn = container.querySelector('#matrixBtn');
        if (mBtn) {
          var canMatrix = rescanSelected.length >= 2 && (function() {
            var types = {};
            rescanEntries.forEach(function(e) {
              if (rescanSelected.indexOf(e.id) >= 0) types[e.scanType] = true;
            });
            return Object.keys(types).length === 1;
          })();
          mBtn.textContent = 'Matrix View (' + rescanSelected.length + ')';
          if (canMatrix) mBtn.classList.add('visible');
          else mBtn.classList.remove('visible');
        }
      });
    })(scanEntries[j]);
  }

  // Compare button
  var compareBtn = container.querySelector('#compareBtn');
  if (compareBtn) {
    compareBtn.addEventListener('click', function() {
      if (rescanSelected.length === 2) {
        rescanComparing = true;
        renderRescanSection(container);
      }
    });
  }

  // Matrix view button
  var matrixBtn = container.querySelector('#matrixBtn');
  if (matrixBtn) {
    matrixBtn.addEventListener('click', function() {
      if (rescanSelected.length < 2) return;
      var types = {};
      rescanEntries.forEach(function(e) {
        if (rescanSelected.indexOf(e.id) >= 0) types[e.scanType] = true;
      });
      if (Object.keys(types).length !== 1) return;
      rescanComparing = 'matrix';
      renderRescanSection(container);
    });
  }

  // Export button
  var rescanExportBtn = container.querySelector('#rescanExportBtn');
  if (rescanExportBtn) {
    rescanExportBtn.addEventListener('click', function() { exportRescanEntries(); });
  }

  // Comparison back button
  var compBack = container.querySelector('.comparison-back');
  if (compBack) {
    compBack.addEventListener('click', function() {
      rescanComparing = false;
      renderRescanSection(container);
    });
  }
}

function handleFilesDrop(files, container) {
  var fileArray = Array.prototype.slice.call(files);
  fileArray.forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = JSON.parse(e.target.result);
        if (data.entries && Array.isArray(data.entries)) {
          data.entries.forEach(function(entry) {
            var exists = rescanEntries.some(function(ex) { return ex.id === entry.id; });
            if (!exists) rescanEntries.push(entry);
          });
        }
        renderRescanSection(container);
      } catch (err) {
        console.error('Failed to parse JSON file:', err);
      }
    };
    reader.readAsText(file);
  });
}

function handlePasteImport(raw, container) {
  var detected = autoDetectScanType(raw);
  var parsed = parseScanOutput(raw, detected.type);

  pendingImportRaw = raw;
  pendingImportParsed = parsed;

  // Populate modal
  document.getElementById('modalTitle').value = '';
  document.getElementById('modalEnv').value = rescanEnv;
  document.getElementById('modalTarget').value = parsed.target || detected.target || '';
  document.getElementById('modalScanType').value = detected.type;
  var now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('modalTimestamp').value = now.toISOString().slice(0, 16);

  document.getElementById('classifyModal').classList.add('open');
}

/* ================================================================
   PARSERS
   ================================================================ */

function autoDetectScanType(raw) {
  var result = { type: 'nmap-port', target: '' };

  if (/\|\s*(ssl-cert|ssl-enum-ciphers|http-methods|http-security-headers|vulners|vuln)/i.test(raw)) {
    result.type = 'nmap-script';
  } else if (/^HTTP\/[12]/m.test(raw.trim())) {
    result.type = 'curl-headers';
  } else if (/Nmap scan report|PORT\s+STATE\s+SERVICE/i.test(raw)) {
    result.type = 'nmap-port';
  }

  var targetMatch = raw.match(/Nmap scan report for\s+(\S+)/);
  if (targetMatch) result.target = targetMatch[1];

  return result;
}

function parseScanOutput(raw, type) {
  switch (type) {
    case 'nmap-port': return parseNmapPort(raw);
    case 'nmap-script': return parseNmapScript(raw);
    case 'curl-headers': return parseCurlHeaders(raw);
    default: return { type: type, rawOutput: raw };
  }
}

/* --- nmap Port Scan Parser --- */

function parseNmapPort(raw) {
  var result = { type: 'nmap-port', target: '', hostStatus: '', latency: '', ports: [], os: '' };

  var targetMatch = raw.match(/Nmap scan report for\s+(\S+)/);
  if (targetMatch) result.target = targetMatch[1];

  var hostMatch = raw.match(/Host is (\w+)\s*\(([^)]*latency[^)]*)\)/i);
  if (hostMatch) {
    result.hostStatus = hostMatch[1];
    result.latency = hostMatch[2].replace(/\s*latency\s*/i, '').trim();
  } else {
    var hostMatch2 = raw.match(/Host is (\w+)/i);
    if (hostMatch2) result.hostStatus = hostMatch2[1];
  }

  var portRegex = /^(\d+)\/(tcp|udp)\s+(open|closed|filtered|open\|filtered)\s+(\S+)\s*(.*)?$/gm;
  var m;
  while ((m = portRegex.exec(raw)) !== null) {
    result.ports.push({
      port: parseInt(m[1]),
      protocol: m[2],
      state: m[3],
      service: m[4],
      version: (m[5] || '').trim()
    });
  }

  var osMatch = raw.match(/OS details:\s*(.+)/i);
  if (osMatch) result.os = osMatch[1].trim();

  return result;
}

/* --- nmap Script Scan Parser --- */

function parseNmapScript(raw) {
  var result = { type: 'nmap-script', target: '', scripts: [] };

  var targetMatch = raw.match(/Nmap scan report for\s+(\S+)/);
  if (targetMatch) result.target = targetMatch[1];

  // ssl-cert
  if (/ssl-cert/.test(raw)) {
    var certBlock = raw.match(/\|\s*ssl-cert:[\s\S]*?(?=\|\s*\w|$)/);
    if (certBlock) {
      var block = certBlock[0];
      var subject = (block.match(/Subject:.*?commonName=([^\s/|]+)/) || [])[1] || '';
      var issuerMatch = block.match(/Issuer:.*?commonName=([^/|\n]+)/);
      var orgMatch = block.match(/Issuer:.*?organizationName=([^/|\n]+)/);
      var issuer = orgMatch ? (orgMatch[1] || '').trim() + ' (' + (issuerMatch ? issuerMatch[1].trim() : '') + ')' : (issuerMatch ? issuerMatch[1].trim() : '');
      var validFrom = (block.match(/Not valid before:\s*(\S+)/) || [])[1] || '';
      var validTo = (block.match(/Not valid after:\s*(\S+)/) || [])[1] || '';
      var sansMatch = block.match(/Subject Alternative Name:\s*(.+)/);
      var sans = sansMatch ? sansMatch[1].split(',').map(function(s) { return s.replace(/DNS:/g, '').trim(); }).filter(Boolean) : [];

      var validToDate = new Date(validTo);
      var now = new Date();
      var daysRemaining = Math.ceil((validToDate - now) / (1000 * 60 * 60 * 24));

      result.scripts.push({
        script: 'ssl-cert', port: 443,
        data: { subject: subject, issuer: issuer, validFrom: validFrom, validTo: validTo, sans: sans, expired: daysRemaining < 0, daysRemaining: daysRemaining }
      });
    }
  }

  // ssl-enum-ciphers
  if (/ssl-enum-ciphers/.test(raw)) {
    var cipherBlock = raw.match(/\|\s*ssl-enum-ciphers:[\s\S]*?(?=\|\s*\w[^_]|$)/);
    if (cipherBlock) {
      var cb = cipherBlock[0];
      var versions = [];
      var versionRegex = /\|\s+(TLSv[\d.]+):/g;
      var vm;
      while ((vm = versionRegex.exec(cb)) !== null) {
        var versionName = vm[1];
        var ciphers = [];
        var afterVersion = cb.substring(vm.index + vm[0].length);
        var nextVersion = afterVersion.search(/\|\s+TLSv[\d.]+:/);
        var versionSection = nextVersion >= 0 ? afterVersion.substring(0, nextVersion) : afterVersion;
        var cipherRegex = /\|\s+(\S+)\s*-\s*(\w+)/g;
        var cm;
        while ((cm = cipherRegex.exec(versionSection)) !== null) {
          ciphers.push({ name: cm[1], strength: cm[2] });
        }
        versions.push({ version: versionName, ciphers: ciphers });
      }
      result.scripts.push({ script: 'ssl-enum-ciphers', port: 443, data: { versions: versions } });
    }
  }

  // http-methods
  if (/http-methods/.test(raw)) {
    var methodBlock = raw.match(/\|\s*http-methods:[\s\S]*?(?=\|\s*\w[^_]|$)/);
    if (methodBlock) {
      var mb = methodBlock[0];
      var supportedMatch = mb.match(/Supported Methods:\s*(.+)/);
      var riskyMatch = mb.match(/Potentially risky methods:\s*(.+)/);
      var methods = supportedMatch ? supportedMatch[1].trim().split(/\s+/) : [];
      var risky = riskyMatch ? riskyMatch[1].trim().split(/\s+/) : [];
      var portMatch = raw.match(/(\d+)\/tcp.*?open.*?(?:http|ssl)/);
      result.scripts.push({
        script: 'http-methods', port: portMatch ? parseInt(portMatch[1]) : 80,
        data: { methods: methods, risky: risky }
      });
    }
  }

  // http-security-headers
  if (/http-security-headers/.test(raw)) {
    var headerBlock = raw.match(/\|\s*http-security-headers:[\s\S]*?(?=\|\s*\w[^_]|$)/);
    if (headerBlock) {
      var hb = headerBlock[0];
      var present = [];
      var missing = [];
      var presentRegex = /\|\s+([A-Za-z-]+):\s*(.+)/g;
      var missingRegex = /\|\s+MISSING:\s*(\S+)/g;
      var pm;
      while ((pm = presentRegex.exec(hb)) !== null) {
        if (pm[1] !== 'MISSING' && pm[1].indexOf('http-security') !== 0) {
          present.push({ header: pm[1], value: pm[2].trim() });
        }
      }
      while ((pm = missingRegex.exec(hb)) !== null) {
        missing.push(pm[1]);
      }
      result.scripts.push({ script: 'http-security-headers', port: 443, data: { present: present, missing: missing } });
    }
  }

  // vulners
  if (/vulners/.test(raw)) {
    var vulnBlock = raw.match(/\|\s*vulners:[\s\S]*?(?=\|\s*\w[^_]|$)/);
    if (vulnBlock) {
      var vb = vulnBlock[0];
      var fullServiceMatch = vb.match(/cpe:\/a:([^\s|]+)/);
      var fullService = fullServiceMatch ? fullServiceMatch[1] : '';
      var vulns = [];
      var cveRegex = /\|\s+(CVE-[\d-]+)\s+([\d.]+)/g;
      var cvm;
      while ((cvm = cveRegex.exec(vb)) !== null) {
        vulns.push({ cve: cvm[1], score: parseFloat(cvm[2]) });
      }
      result.scripts.push({ script: 'vulners', port: 80, data: { service: fullService, vulns: vulns } });
    }
  }

  return result;
}

/* --- curl Headers Parser --- */

var KNOWN_SECURITY_HEADERS = [
  'strict-transport-security',
  'x-frame-options',
  'x-content-type-options',
  'content-security-policy',
  'x-xss-protection',
  'referrer-policy',
  'permissions-policy',
  'x-permitted-cross-domain-policies',
  'cross-origin-opener-policy',
  'cross-origin-resource-policy',
  'cross-origin-embedder-policy'
];

function parseCurlHeaders(raw) {
  var result = { type: 'curl-headers', target: '', statusCode: 0, protocol: '', headers: [], securityHeaders: { present: [], missing: [] } };

  var lines = raw.trim().split('\n');

  var statusMatch = lines[0].match(/^(HTTP\/[\d.]+)\s+(\d+)/);
  if (statusMatch) {
    result.protocol = statusMatch[1];
    result.statusCode = parseInt(statusMatch[2]);
  }

  var headerKeys = {};
  for (var i = 1; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var colonIdx = line.indexOf(':');
    if (colonIdx > 0) {
      var key = line.substring(0, colonIdx).trim().toLowerCase();
      var value = line.substring(colonIdx + 1).trim();
      result.headers.push({ key: key, value: value });
      headerKeys[key] = true;
    }
  }

  KNOWN_SECURITY_HEADERS.forEach(function(h) {
    if (headerKeys[h]) {
      var found = result.headers.filter(function(hdr) { return hdr.key === h; })[0];
      result.securityHeaders.present.push({ header: h, value: found ? found.value : '' });
    } else {
      result.securityHeaders.missing.push(h);
    }
  });

  return result;
}

/* ================================================================
   HEADER AUDIT: PARSER
   ================================================================ */

function detectHeaderInputType(raw) {
  var trimmed = raw.trim();
  if (/\|\s*http-security-headers:/i.test(trimmed)) return 'nmap-script';
  if (/^HTTP\/[12]/m.test(trimmed)) return 'curl-headers';
  if (/^[\w-]+\s*:/m.test(trimmed)) return 'raw-headers';
  return 'raw-headers';
}

function parseRawHeaders(raw) {
  var headers = {};
  var lines = raw.trim().split('\n');
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var colonIdx = line.indexOf(':');
    if (colonIdx > 0) {
      var key = line.substring(0, colonIdx).trim();
      var value = line.substring(colonIdx + 1).trim();
      headers[key.toLowerCase()] = { original: key, value: value };
    }
  }
  return { headers: headers, meta: { statusCode: null, protocol: null, source: 'raw-headers' } };
}

function normalizeHeaderInput(raw) {
  var inputType = detectHeaderInputType(raw);
  var result = { headers: {}, meta: { statusCode: null, protocol: null, source: inputType, target: '' } };

  if (inputType === 'curl-headers') {
    var parsed = parseCurlHeaders(raw);
    result.meta.statusCode = parsed.statusCode;
    result.meta.protocol = parsed.protocol;
    result.meta.target = parsed.target || '';
    // Re-parse raw lines to preserve original header casing (parseCurlHeaders lowercases keys)
    var lines = raw.trim().split('\n');
    for (var i = 1; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;
      var colonIdx = line.indexOf(':');
      if (colonIdx > 0) {
        var originalKey = line.substring(0, colonIdx).trim();
        var val = line.substring(colonIdx + 1).trim();
        result.headers[originalKey.toLowerCase()] = { original: originalKey, value: val };
      }
    }
  } else if (inputType === 'nmap-script') {
    var scriptParsed = parseNmapScript(raw);
    result.meta.target = scriptParsed.target || '';
    (scriptParsed.scripts || []).forEach(function(s) {
      if (s.script === 'http-security-headers' && s.data) {
        (s.data.present || []).forEach(function(h) {
          result.headers[h.header.toLowerCase()] = { original: h.header, value: h.value || '' };
        });
      }
    });
  } else {
    var rawParsed = parseRawHeaders(raw);
    result.headers = rawParsed.headers;
  }

  if (!result.meta.target && result.headers['host']) {
    result.meta.target = result.headers['host'].value;
  }

  return result;
}

/* ================================================================
   HEADER AUDIT: ANALYSIS ENGINE
   ================================================================ */

function analyzeHeaders(normalized) {
  var headers = normalized.headers;
  var headerKeysLower = Object.keys(headers);

  var findings = {
    enabled: [],
    missing: [],
    deprecated: [],
    fingerprint: [],
    insecure: [],
    empty: []
  };

  // 1. Enabled security headers
  HEADER_RULES.security.forEach(function(secHeader) {
    if (headers[secHeader]) {
      findings.enabled.push({ header: headers[secHeader].original || secHeader, value: headers[secHeader].value });
    }
  });

  // 2. Missing critical headers
  var hasFrameAncestors = false;
  if (headers['content-security-policy']) {
    hasFrameAncestors = /frame-ancestors/i.test(headers['content-security-policy'].value);
  }

  HEADER_RULES.missing.forEach(function(rule) {
    var key = rule.header.toLowerCase();
    if (!headers[key]) {
      if (key === 'x-frame-options' && hasFrameAncestors) return;
      findings.missing.push({ header: rule.header, description: rule.description, recommended: rule.recommended });
    }
  });

  // 3. Fingerprint headers
  HEADER_RULES.fingerprint.forEach(function(rule) {
    var key = rule.header.toLowerCase();
    if (headers[key]) {
      var value = headers[key].value;
      if (rule.pattern === '*' || value.toLowerCase().indexOf(rule.pattern.toLowerCase()) >= 0) {
        var alreadyFound = findings.fingerprint.some(function(f) {
          return f.header.toLowerCase() === key && f.technology === rule.technology;
        });
        if (!alreadyFound) {
          findings.fingerprint.push({ header: headers[key].original || rule.header, value: value, technology: rule.technology });
        }
      }
    }
  });

  // 4. Deprecated headers
  HEADER_RULES.deprecated.forEach(function(rule) {
    var key = rule.header.toLowerCase();
    if (headers[key]) {
      findings.deprecated.push({ header: headers[key].original || rule.header, value: headers[key].value, reason: rule.reason });
    }
  });

  // 5. Insecure values
  Object.keys(HEADER_RULES.valueChecks).forEach(function(headerKey) {
    if (headers[headerKey]) {
      var value = headers[headerKey].value;
      var rules = HEADER_RULES.valueChecks[headerKey];
      (rules.checks || []).forEach(function(check) {
        if (!check.test(value)) {
          findings.insecure.push({
            header: headers[headerKey].original || headerKey,
            value: value,
            issue: check.issue,
            recommended: check.recommended
          });
        }
      });
    }
  });

  // 6. Empty headers
  headerKeysLower.forEach(function(key) {
    if (!headers[key].value || !headers[key].value.trim()) {
      findings.empty.push({ header: headers[key].original || key });
    }
  });

  var counts = {
    enabled: findings.enabled.length,
    missing: findings.missing.length,
    deprecated: findings.deprecated.length,
    fingerprint: findings.fingerprint.length,
    insecure: findings.insecure.length,
    empty: findings.empty.length
  };

  return { findings: findings, counts: counts };
}

/* ================================================================
   COMPARISON ENGINE
   ================================================================ */

function renderComparisonView() {
  var scan1 = rescanEntries.filter(function(e) { return e.id === rescanSelected[0]; })[0];
  var scan2 = rescanEntries.filter(function(e) { return e.id === rescanSelected[1]; })[0];
  if (!scan1 || !scan2) return '<div class="empty-state"><div class="empty-state-text">Could not find selected scans</div></div>';

  var older, newer;
  if (new Date(scan1.timestamp) <= new Date(scan2.timestamp)) {
    older = scan1; newer = scan2;
  } else {
    older = scan2; newer = scan1;
  }

  var html = '<span class="comparison-back">&larr; Back to timeline</span>';
  html += '<div class="comparison-view visible">';

  html += '<div class="audit-comp-header">' +
    '<div class="audit-comp-card">' +
      '<div class="audit-comp-label">OLDER</div>' +
      '<div class="audit-comp-title">' + escapeHtml(older.title) + '</div>' +
      '<div class="audit-comp-meta">' + formatDate(older.timestamp) + ' &middot; ' + escapeHtml(older.scanType) + '</div>' +
    '</div>' +
    '<div class="audit-comp-arrow">&rarr;</div>' +
    '<div class="audit-comp-card">' +
      '<div class="audit-comp-label">NEWER</div>' +
      '<div class="audit-comp-title">' + escapeHtml(newer.title) + '</div>' +
      '<div class="audit-comp-meta">' + formatDate(newer.timestamp) + ' &middot; ' + escapeHtml(newer.scanType) + '</div>' +
    '</div>' +
  '</div>';

  if (older.scanType === newer.scanType) {
    switch (older.scanType) {
      case 'nmap-port': html += renderPortComparison(older.parsed, newer.parsed); break;
      case 'nmap-script': html += renderScriptComparison(older.parsed, newer.parsed); break;
      case 'curl-headers': html += renderHeaderComparison(older.parsed, newer.parsed); break;
      default: html += renderRawComparison(older.rawOutput, newer.rawOutput);
    }
  } else {
    html += '<p style="color:var(--text-muted);margin-bottom:12px;">Different scan types -- showing raw diff</p>';
    html += renderRawComparison(older.rawOutput, newer.rawOutput);
  }

  html += '<details style="margin-top:16px;"><summary style="cursor:pointer;color:var(--accent-cyan);font-size:0.85rem;">Raw Output</summary>';
  html += renderRawComparison(older.rawOutput, newer.rawOutput);
  html += '</details>';

  html += '</div>';
  return html;
}

function renderMatrixView() {
  var selected = rescanEntries.filter(function(e) { return rescanSelected.indexOf(e.id) >= 0; });
  if (selected.length < 2) return renderEmptyState('Select at least 2 scans');

  var scanType = selected[0].scanType;

  var html = '<span class="comparison-back">&larr; Back to timeline</span>';
  html += '<div class="comparison-view visible">';
  html += '<h3 style="color:var(--accent-cyan);margin:0 0 8px;">Matrix View &mdash; ' + escapeHtml(scanType) + ' (' + selected.length + ' hosts)</h3>';

  switch (scanType) {
    case 'nmap-port': html += renderPortMatrix(selected); break;
    case 'curl-headers': html += renderHeaderMatrix(selected); break;
    default: html += renderEmptyState('Matrix view not supported for ' + escapeHtml(scanType));
  }

  html += '</div>';
  return html;
}

function renderPortMatrix(scans) {
  var allPorts = {};
  scans.forEach(function(scan) {
    var ports = (scan.parsed && scan.parsed.ports) || [];
    ports.forEach(function(p) {
      allPorts[p.port + '/' + p.protocol] = true;
    });
  });
  var sortedPorts = Object.keys(allPorts).sort(function(a, b) { return parseInt(a) - parseInt(b); });

  if (sortedPorts.length === 0) return renderEmptyState('No port data found in selected scans');

  var lookup = {};
  scans.forEach(function(scan) {
    lookup[scan.id] = {};
    var ports = (scan.parsed && scan.parsed.ports) || [];
    ports.forEach(function(p) {
      lookup[scan.id][p.port + '/' + p.protocol] = p;
    });
  });

  var html = '<div class="matrix-toolbar">' +
    '<button class="matrix-filter-btn" id="matrixFilterDiff">Show only differences</button>' +
    '<button class="matrix-export-btn" id="matrixExportCsv">Export CSV</button>' +
    '</div>';

  html += '<div class="matrix-container"><table class="matrix-table" id="matrixTable">';

  html += '<thead><tr><th>Host</th>';
  sortedPorts.forEach(function(portKey) {
    html += '<th data-sort="' + escapeHtml(portKey) + '">' + escapeHtml(portKey) + '</th>';
  });
  html += '</tr></thead>';

  html += '<tbody>';
  scans.forEach(function(scan) {
    html += '<tr><td>' + escapeHtml(scan.target || scan.title) + '</td>';
    sortedPorts.forEach(function(portKey) {
      var p = lookup[scan.id][portKey];
      if (p) {
        var cls = 'matrix-cell-' + (p.state || 'open');
        var label = p.state || 'open';
        if (p.service) label += ' (' + p.service + ')';
        html += '<td class="' + cls + '">' + escapeHtml(label) + '</td>';
      } else {
        html += '<td class="matrix-cell-missing">&mdash;</td>';
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  return html;
}

function renderHeaderMatrix(scans) {
  var allHeaders = {};
  scans.forEach(function(scan) {
    var headers = (scan.parsed && scan.parsed.headers) || {};
    Object.keys(headers).forEach(function(key) {
      allHeaders[key] = true;
    });
  });
  var sortedHeaders = Object.keys(allHeaders).sort();

  if (sortedHeaders.length === 0) return renderEmptyState('No header data found in selected scans');

  var lookup = {};
  scans.forEach(function(scan) {
    lookup[scan.id] = {};
    var headers = (scan.parsed && scan.parsed.headers) || {};
    Object.keys(headers).forEach(function(key) {
      lookup[scan.id][key] = headers[key].value || headers[key];
    });
  });

  var fpHeaders = {};
  (HEADER_RULES.fingerprint || []).forEach(function(r) {
    fpHeaders[r.header.toLowerCase()] = true;
  });

  var html = '<div class="matrix-toolbar">' +
    '<button class="matrix-filter-btn" id="matrixFilterDiff">Show only differences</button>' +
    '<button class="matrix-export-btn" id="matrixExportCsv">Export CSV</button>' +
    '</div>';

  html += '<div class="matrix-container"><table class="matrix-table" id="matrixTable">';

  html += '<thead><tr><th>Host</th>';
  sortedHeaders.forEach(function(hdr) {
    html += '<th data-sort="' + escapeHtml(hdr) + '">' + escapeHtml(hdr) + '</th>';
  });
  html += '</tr></thead>';

  html += '<tbody>';
  scans.forEach(function(scan) {
    html += '<tr><td>' + escapeHtml(scan.target || scan.title) + '</td>';
    sortedHeaders.forEach(function(hdr) {
      var val = lookup[scan.id][hdr];
      if (val) {
        var cls = '';
        if (fpHeaders[hdr.toLowerCase()]) cls = 'matrix-cell-fingerprint';
        html += '<td class="' + cls + '">' + escapeHtml(val) + '</td>';
      } else {
        html += '<td class="matrix-cell-missing">&mdash;</td>';
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  return html;
}

function renderPortComparison(oldParsed, newParsed) {
  if (!oldParsed || !newParsed) return renderEmptyState('Parsed data not available');
  var oldPorts = oldParsed.ports || [];
  var newPorts = newParsed.ports || [];

  var allPortKeys = {};
  oldPorts.forEach(function(p) { allPortKeys[p.port + '/' + p.protocol] = true; });
  newPorts.forEach(function(p) { allPortKeys[p.port + '/' + p.protocol] = true; });
  var sortedKeys = Object.keys(allPortKeys).sort(function(a, b) { return parseInt(a) - parseInt(b); });

  var items = [];
  sortedKeys.forEach(function(portKey) {
    var parts = portKey.split('/');
    var portNum = parseInt(parts[0]);
    var proto = parts[1];
    var oldP = oldPorts.filter(function(p) { return p.port === portNum && p.protocol === proto; })[0];
    var newP = newPorts.filter(function(p) { return p.port === portNum && p.protocol === proto; })[0];

    var status, detail;
    if (!oldP && newP) {
      if (newP.state === 'open') { status = 'new'; detail = 'New open port'; }
      else { status = 'fixed'; detail = 'New (closed)'; }
    } else if (oldP && !newP) {
      status = 'fixed'; detail = 'Port removed';
    } else if (oldP.state !== newP.state) {
      if (oldP.state === 'open' && (newP.state === 'closed' || newP.state === 'filtered')) {
        status = 'fixed'; detail = oldP.state + ' \u2192 ' + newP.state;
      } else if ((oldP.state === 'closed' || oldP.state === 'filtered') && newP.state === 'open') {
        status = 'new'; detail = oldP.state + ' \u2192 ' + newP.state;
      } else {
        status = 'changed'; detail = oldP.state + ' \u2192 ' + newP.state;
      }
    } else if (oldP && newP && oldP.version !== newP.version) {
      status = 'changed'; detail = (oldP.version || '?') + ' \u2192 ' + (newP.version || '?');
    } else {
      status = 'same'; detail = (newP || oldP).state;
    }

    items.push({
      port: portKey,
      service: (oldP || newP).service || '',
      status: status,
      detail: detail
    });
  });

  // Sort: fixed, new, changed, same
  var order = { fixed: 0, 'new': 1, changed: 2, same: 3 };
  items.sort(function(a, b) { return (order[a.status] || 3) - (order[b.status] || 3); });

  var fixedCount = items.filter(function(i) { return i.status === 'fixed'; }).length;
  var newCount = items.filter(function(i) { return i.status === 'new'; }).length;
  var changedCount = items.filter(function(i) { return i.status === 'changed'; }).length;
  var sameCount = items.filter(function(i) { return i.status === 'same'; }).length;

  var html = '<div class="audit-comp-summary">';
  if (fixedCount) html += '<span class="audit-comp-badge fixed">' + fixedCount + ' fixed</span>';
  if (newCount) html += '<span class="audit-comp-badge new-issue">' + newCount + ' new</span>';
  if (changedCount) html += '<span class="audit-comp-badge" style="background:rgba(230,219,116,0.15);color:var(--accent-yellow);">' + changedCount + ' changed</span>';
  if (sameCount) html += '<span class="audit-comp-badge same">' + sameCount + ' unchanged</span>';
  html += '</div>';

  html += '<div class="audit-comp-list">';
  var lastStatus = '';
  items.forEach(function(item) {
    if (item.status !== lastStatus) {
      var label = item.status === 'fixed' ? 'Fixed' : item.status === 'new' ? 'New Issues' : item.status === 'changed' ? 'Changed' : 'Unchanged';
      html += '<div class="audit-comp-group-label ' + item.status + '">' + label + '</div>';
      lastStatus = item.status;
    }
    var icon = item.status === 'fixed' ? '&#10003;' : item.status === 'new' ? '&#10007;' : item.status === 'changed' ? '&#9998;' : '&#8212;';
    html += '<div class="audit-comp-item ' + item.status + '">' +
      '<span class="audit-comp-icon">' + icon + '</span>' +
      '<span class="audit-comp-item-header">' + escapeHtml(item.port) + '</span>' +
      '<span class="audit-comp-item-cat">' + escapeHtml(item.service) + '</span>' +
      '<span class="audit-comp-item-detail">' + escapeHtml(item.detail) + '</span>' +
    '</div>';
  });
  html += '</div>';
  return html;
}

function renderScriptComparison(oldParsed, newParsed) {
  if (!oldParsed || !newParsed) return renderEmptyState('Parsed data not available');
  var oldScripts = oldParsed.scripts || [];
  var newScripts = newParsed.scripts || [];

  var scriptNames = {};
  oldScripts.forEach(function(s) { scriptNames[s.script] = true; });
  newScripts.forEach(function(s) { scriptNames[s.script] = true; });

  var html = '';
  Object.keys(scriptNames).forEach(function(name) {
    var oldS = oldScripts.filter(function(s) { return s.script === name; })[0];
    var newS = newScripts.filter(function(s) { return s.script === name; })[0];
    html += '<h4 style="color:var(--accent-cyan);margin:12px 0 8px;font-size:0.9rem;">' + escapeHtml(name) + '</h4>';

    switch (name) {
      case 'ssl-cert': html += renderSSLCertComparison(oldS ? oldS.data : null, newS ? newS.data : null); break;
      case 'ssl-enum-ciphers': html += renderCipherComparison(oldS ? oldS.data : null, newS ? newS.data : null); break;
      case 'http-methods': html += renderMethodsComparison(oldS ? oldS.data : null, newS ? newS.data : null); break;
      case 'http-security-headers': html += renderSecHeadersComparison(oldS ? oldS.data : null, newS ? newS.data : null); break;
      case 'vulners': html += renderVulnComparison(oldS ? oldS.data : null, newS ? newS.data : null); break;
      default: html += '<p style="color:var(--text-muted);font-size:0.8rem;">Unrecognized script</p>';
    }
  });

  return html;
}

function renderSSLCertComparison(oldData, newData) {
  if (!oldData && !newData) return '';
  var fields = ['subject', 'issuer', 'validFrom', 'validTo', 'expired'];
  var html = '<div class="audit-comp-list">';
  fields.forEach(function(f) {
    var oldVal = oldData ? String(oldData[f]) : '-';
    var newVal = newData ? String(newData[f]) : '-';
    var status = 'same';
    if (oldVal !== newVal) status = 'changed';
    if (f === 'expired' && oldData && newData) {
      if (oldData.expired && !newData.expired) status = 'fixed';
      if (!oldData.expired && newData.expired) status = 'new';
    }
    var icon = status === 'fixed' ? '&#10003;' : status === 'new' ? '&#10007;' : status === 'changed' ? '&#9998;' : '&#8212;';
    var detail = oldVal === newVal ? oldVal : oldVal + ' \u2192 ' + newVal;
    html += '<div class="audit-comp-item ' + status + '">' +
      '<span class="audit-comp-icon">' + icon + '</span>' +
      '<span class="audit-comp-item-header">' + escapeHtml(f) + '</span>' +
      '<span class="audit-comp-item-detail">' + escapeHtml(detail) + '</span>' +
    '</div>';
  });
  html += '</div>';
  return html;
}

function renderCipherComparison(oldData, newData) {
  if (!oldData && !newData) return '';
  var oldVersions = oldData ? oldData.versions.map(function(v) { return v.version; }) : [];
  var newVersions = newData ? newData.versions.map(function(v) { return v.version; }) : [];
  var allVersionsObj = {};
  oldVersions.concat(newVersions).forEach(function(v) { allVersionsObj[v] = true; });

  var html = '<div class="audit-comp-list">';
  Object.keys(allVersionsObj).forEach(function(v) {
    var inOld = oldVersions.indexOf(v) >= 0;
    var inNew = newVersions.indexOf(v) >= 0;
    var status, detail;
    if (inOld && !inNew) { status = 'fixed'; detail = 'Removed'; }
    else if (!inOld && inNew) { status = 'new'; detail = 'Added'; }
    else { status = 'same'; detail = 'Present'; }
    if (v === 'TLSv1.0' || v === 'TLSv1.1') {
      if (inOld && !inNew) { status = 'fixed'; detail = 'Removed (weak)'; }
      else if (inNew) { status = 'new'; detail = 'Still present (weak)'; }
    }
    var icon = status === 'fixed' ? '&#10003;' : status === 'new' ? '&#10007;' : '&#8212;';
    html += '<div class="audit-comp-item ' + status + '">' +
      '<span class="audit-comp-icon">' + icon + '</span>' +
      '<span class="audit-comp-item-header">' + escapeHtml(v) + '</span>' +
      '<span class="audit-comp-item-detail">' + escapeHtml(detail) + '</span>' +
    '</div>';
  });
  html += '</div>';
  return html;
}

function renderMethodsComparison(oldData, newData) {
  if (!oldData && !newData) return '';
  var oldRisky = oldData ? oldData.risky : [];
  var newRisky = newData ? newData.risky : [];
  var allMethodsObj = {};
  (oldData ? oldData.methods : []).concat(newData ? newData.methods : []).forEach(function(m) { allMethodsObj[m] = true; });

  var html = '<div class="audit-comp-list">';
  Object.keys(allMethodsObj).forEach(function(m) {
    var inOld = oldData && oldData.methods.indexOf(m) >= 0;
    var inNew = newData && newData.methods.indexOf(m) >= 0;
    var wasRisky = oldRisky.indexOf(m) >= 0;
    var isRisky = newRisky.indexOf(m) >= 0;
    var status, detail;
    if (wasRisky && !isRisky && !inNew) { status = 'fixed'; detail = 'Risky method removed'; }
    else if (!wasRisky && isRisky) { status = 'new'; detail = 'New risky method'; }
    else if (!inOld && inNew) { status = 'changed'; detail = 'Added'; }
    else if (inOld && !inNew) { status = 'changed'; detail = 'Removed'; }
    else { status = 'same'; detail = isRisky ? 'Risky' : 'Present'; }
    var icon = status === 'fixed' ? '&#10003;' : status === 'new' ? '&#10007;' : status === 'changed' ? '&#9998;' : '&#8212;';
    html += '<div class="audit-comp-item ' + status + '">' +
      '<span class="audit-comp-icon">' + icon + '</span>' +
      '<span class="audit-comp-item-header">' + escapeHtml(m) + '</span>' +
      '<span class="audit-comp-item-detail">' + escapeHtml(detail) + '</span>' +
    '</div>';
  });
  html += '</div>';
  return html;
}

function renderSecHeadersComparison(oldData, newData) {
  if (!oldData && !newData) return '';
  var oldPresent = oldData ? oldData.present.map(function(h) { return h.header.toLowerCase(); }) : [];
  var newPresent = newData ? newData.present.map(function(h) { return h.header.toLowerCase(); }) : [];

  var allHeadersObj = {};
  oldPresent.forEach(function(h) { allHeadersObj[h] = true; });
  (oldData ? oldData.missing : []).forEach(function(h) { allHeadersObj[h.toLowerCase()] = true; });
  newPresent.forEach(function(h) { allHeadersObj[h] = true; });
  (newData ? newData.missing : []).forEach(function(h) { allHeadersObj[h.toLowerCase()] = true; });

  var items = [];
  Object.keys(allHeadersObj).forEach(function(h) {
    var wasPresent = oldPresent.indexOf(h) >= 0;
    var isPresent = newPresent.indexOf(h) >= 0;
    var oldVal = '', newVal = '';
    if (wasPresent && oldData) {
      var op = oldData.present.filter(function(p) { return p.header.toLowerCase() === h; })[0];
      oldVal = op ? op.value : '';
    }
    if (isPresent && newData) {
      var np = newData.present.filter(function(p) { return p.header.toLowerCase() === h; })[0];
      newVal = np ? np.value : '';
    }
    var status, detail;
    if (!wasPresent && isPresent) { status = 'fixed'; detail = 'Added'; }
    else if (wasPresent && !isPresent) { status = 'new'; detail = 'Removed'; }
    else if (wasPresent && isPresent && oldVal !== newVal) { status = 'changed'; detail = oldVal + ' \u2192 ' + newVal; }
    else if (wasPresent && isPresent) { status = 'same'; detail = newVal; }
    else { status = 'same'; detail = 'Missing in both'; }
    items.push({ header: h, status: status, detail: detail });
  });

  var order = { fixed: 0, 'new': 1, changed: 2, same: 3 };
  items.sort(function(a, b) { return (order[a.status] || 3) - (order[b.status] || 3); });

  var html = '<div class="audit-comp-list">';
  var lastStatus = '';
  items.forEach(function(item) {
    if (item.status !== lastStatus) {
      var label = item.status === 'fixed' ? 'Added (Good)' : item.status === 'new' ? 'Removed (Bad)' : item.status === 'changed' ? 'Changed' : 'Unchanged';
      html += '<div class="audit-comp-group-label ' + item.status + '">' + label + '</div>';
      lastStatus = item.status;
    }
    var icon = item.status === 'fixed' ? '&#10003;' : item.status === 'new' ? '&#10007;' : item.status === 'changed' ? '&#9998;' : '&#8212;';
    html += '<div class="audit-comp-item ' + item.status + '">' +
      '<span class="audit-comp-icon">' + icon + '</span>' +
      '<span class="audit-comp-item-header">' + escapeHtml(item.header) + '</span>' +
      '<span class="audit-comp-item-detail">' + escapeHtml(item.detail) + '</span>' +
    '</div>';
  });
  html += '</div>';
  return html;
}

function renderVulnComparison(oldData, newData) {
  if (!oldData && !newData) return '';
  var oldCVEs = oldData ? oldData.vulns.map(function(v) { return v.cve; }) : [];
  var newCVEs = newData ? newData.vulns.map(function(v) { return v.cve; }) : [];
  var allCVEsObj = {};
  oldCVEs.concat(newCVEs).forEach(function(c) { allCVEsObj[c] = true; });

  var items = [];
  Object.keys(allCVEsObj).forEach(function(cve) {
    var oldV = oldData ? oldData.vulns.filter(function(v) { return v.cve === cve; })[0] : null;
    var newV = newData ? newData.vulns.filter(function(v) { return v.cve === cve; })[0] : null;
    var status, detail;
    if (oldV && !newV) { status = 'fixed'; detail = 'CVSS ' + oldV.score + ' \u2192 resolved'; }
    else if (!oldV && newV) { status = 'new'; detail = 'CVSS ' + newV.score; }
    else if (oldV && newV && oldV.score !== newV.score) { status = 'changed'; detail = 'CVSS ' + oldV.score + ' \u2192 ' + newV.score; }
    else { status = 'same'; detail = 'CVSS ' + (newV || oldV).score; }
    items.push({ cve: cve, status: status, detail: detail });
  });

  var order = { fixed: 0, 'new': 1, changed: 2, same: 3 };
  items.sort(function(a, b) { return (order[a.status] || 3) - (order[b.status] || 3); });

  var html = '<div class="audit-comp-list">';
  var lastStatus = '';
  items.forEach(function(item) {
    if (item.status !== lastStatus) {
      var label = item.status === 'fixed' ? 'Fixed' : item.status === 'new' ? 'New Vulnerabilities' : item.status === 'changed' ? 'Score Changed' : 'Unchanged';
      html += '<div class="audit-comp-group-label ' + item.status + '">' + label + '</div>';
      lastStatus = item.status;
    }
    var icon = item.status === 'fixed' ? '&#10003;' : item.status === 'new' ? '&#10007;' : item.status === 'changed' ? '&#9998;' : '&#8212;';
    html += '<div class="audit-comp-item ' + item.status + '">' +
      '<span class="audit-comp-icon">' + icon + '</span>' +
      '<span class="audit-comp-item-header">' + escapeHtml(item.cve) + '</span>' +
      '<span class="audit-comp-item-detail">' + escapeHtml(item.detail) + '</span>' +
    '</div>';
  });
  html += '</div>';
  return html;
}

function renderHeaderComparison(oldParsed, newParsed) {
  if (!oldParsed || !newParsed) return renderEmptyState('Parsed data not available');

  var html = '';

  if (oldParsed.statusCode !== newParsed.statusCode) {
    html += '<div class="audit-comp-item changed" style="margin-bottom:12px;">' +
      '<span class="audit-comp-icon">&#9998;</span>' +
      '<span class="audit-comp-item-header">Status Code</span>' +
      '<span class="audit-comp-item-detail">' + oldParsed.statusCode + ' \u2192 ' + newParsed.statusCode + '</span>' +
    '</div>';
  }

  html += '<h4 style="color:var(--accent-cyan);margin:12px 0 8px;font-size:0.9rem;">Security Headers</h4>';
  html += renderSecHeadersComparison(oldParsed.securityHeaders, newParsed.securityHeaders);

  html += '<h4 style="color:var(--accent-cyan);margin:12px 0 8px;font-size:0.9rem;">All Headers</h4>';
  var oldHeaders = oldParsed.headers || [];
  var newHeaders = newParsed.headers || [];
  var allKeysObj = {};
  oldHeaders.forEach(function(h) { allKeysObj[h.key] = true; });
  newHeaders.forEach(function(h) { allKeysObj[h.key] = true; });

  var items = [];
  Object.keys(allKeysObj).forEach(function(k) {
    var oldH = oldHeaders.filter(function(h) { return h.key === k; })[0];
    var newH = newHeaders.filter(function(h) { return h.key === k; })[0];
    var status, detail;
    if (!oldH) { status = 'new'; detail = 'Added: ' + (newH ? newH.value : ''); }
    else if (!newH) { status = 'fixed'; detail = 'Removed'; }
    else if (oldH.value !== newH.value) { status = 'changed'; detail = oldH.value + ' \u2192 ' + newH.value; }
    else { status = 'same'; detail = newH.value; }
    items.push({ header: k, status: status, detail: detail });
  });

  var order = { fixed: 0, 'new': 1, changed: 2, same: 3 };
  items.sort(function(a, b) { return (order[a.status] || 3) - (order[b.status] || 3); });

  html += '<div class="audit-comp-list">';
  items.forEach(function(item) {
    var icon = item.status === 'fixed' ? '&#10003;' : item.status === 'new' ? '&#10007;' : item.status === 'changed' ? '&#9998;' : '&#8212;';
    html += '<div class="audit-comp-item ' + item.status + '">' +
      '<span class="audit-comp-icon">' + icon + '</span>' +
      '<span class="audit-comp-item-header">' + escapeHtml(item.header) + '</span>' +
      '<span class="audit-comp-item-detail">' + escapeHtml(item.detail) + '</span>' +
    '</div>';
  });
  html += '</div>';

  return html;
}

function renderRawComparison(oldRaw, newRaw) {
  return '<div class="raw-diff">' +
    '<div class="raw-diff-pane"><div class="diff-label">Older Scan</div><pre>' + escapeHtml(oldRaw || '') + '</pre></div>' +
    '<div class="raw-diff-pane"><div class="diff-label">Newer Scan</div><pre>' + escapeHtml(newRaw || '') + '</pre></div>' +
    '</div>';
}

function performSearch(query) {
  searchQuery = query;
  if (!query) {
    updateSidebarMatchCounts(null);
    if (activeSection) {
      renderMainContent();
    } else {
      document.getElementById('mainContent').innerHTML = renderEmptyState('Select a section from the sidebar', 'Or press / to search');
    }
    return;
  }

  var q = query.toLowerCase();
  var counts = {};
  var results = [];

  // Search Reference
  var refSections = [];
  commands.forEach(function(c) {
    if (refSections.indexOf(c.section) === -1) refSections.push(c.section);
  });
  refSections.forEach(function(section) {
    var matches = commands.filter(function(c) { return c.section === section && matchesSearch(c, q); });
    if (matches.length > 0) {
      counts['reference:' + section] = matches.length;
      results.push({ type: 'reference', key: section, items: matches });
    }
  });

  // Search Craft
  Object.keys(craftTools).forEach(function(toolKey) {
    var tool = craftTools[toolKey];
    var matchCount = 0;
    var name = (tool.name || toolKey).toLowerCase();
    if (name.indexOf(q) >= 0) matchCount++;
    (tool.groups || []).forEach(function(g) {
      if (g.name.toLowerCase().indexOf(q) >= 0) matchCount++;
      g.options.forEach(function(o) {
        if (o.label.toLowerCase().indexOf(q) >= 0 || o.flag.toLowerCase().indexOf(q) >= 0) matchCount++;
      });
    });
    (tool.toggles || []).forEach(function(t) {
      if (t.label.toLowerCase().indexOf(q) >= 0 || t.flag.toLowerCase().indexOf(q) >= 0) matchCount++;
    });
    if (matchCount > 0) counts['craft:' + toolKey] = matchCount;
  });

  // Search Docs
  Object.keys(docs).forEach(function(toolKey) {
    var entries = docs[toolKey];
    var matches = entries.filter(function(e) {
      return (e.flag || '').toLowerCase().indexOf(q) >= 0 ||
        (e.title || '').toLowerCase().indexOf(q) >= 0 ||
        (e.description || '').toLowerCase().indexOf(q) >= 0;
    });
    if (matches.length > 0) {
      counts['docs:' + toolKey] = matches.length;
      results.push({ type: 'docs', key: toolKey, items: matches });
    }
  });

  // Search Rescan History
  var rescanMatches = rescanEntries.filter(function(e) {
    return (e.title || '').toLowerCase().indexOf(q) >= 0 ||
      (e.target || '').toLowerCase().indexOf(q) >= 0 ||
      (e.environment || '').toLowerCase().indexOf(q) >= 0;
  });
  if (rescanMatches.length > 0) counts['rescan:rescan'] = rescanMatches.length;

  // Search Header Audit
  var auditMatches = auditEntries.filter(function(e) {
    return (e.title || '').toLowerCase().indexOf(q) >= 0 ||
      (e.target || '').toLowerCase().indexOf(q) >= 0;
  });
  if (auditMatches.length > 0) counts['audit:audit'] = auditMatches.length;

  updateSidebarMatchCounts(counts);
  renderSearchResults(results);
}

function matchesSearch(cmd, q) {
  return (cmd.title || '').toLowerCase().indexOf(q) >= 0 ||
    (cmd.cmd || '').toLowerCase().indexOf(q) >= 0 ||
    (cmd.notes || '').toLowerCase().indexOf(q) >= 0 ||
    (cmd.tags || []).some(function(t) { return t.toLowerCase().indexOf(q) >= 0; });
}

function renderSearchResults(results) {
  var main = document.getElementById('mainContent');
  if (results.length === 0) {
    main.innerHTML = '<div class="section-header"><div class="section-prompt"># <span class="cmd">scanref</span> <span class="flag">--search</span> <span class="arg">"' + escapeHtml(searchQuery) + '"</span></div><h2>Search Results</h2><p>No matches found for "' + escapeHtml(searchQuery) + '"</p></div>';
    return;
  }

  var html = '<div class="section-header"><div class="section-prompt"># <span class="cmd">scanref</span> <span class="flag">--search</span> <span class="arg">"' + escapeHtml(searchQuery) + '"</span></div><h2>Search Results</h2><p>Matches for "' + escapeHtml(searchQuery) + '"</p></div>';

  results.forEach(function(group) {
    html += '<div class="search-results-section">';
    if (group.type === 'reference') {
      html += '<h3>' + escapeHtml(group.key) + '</h3>';
      html += '<div class="cards-grid">';
      group.items.forEach(function(cmd, i) { html += renderCommandCard(cmd, i); });
      html += '</div>';
    } else if (group.type === 'docs') {
      html += '<h3>' + escapeHtml(group.key) + ' Reference</h3>';
      group.items.forEach(function(entry) {
        var desc = (entry.description || '').substring(0, 200);
        if ((entry.description || '').length > 200) desc += '...';
        html += '<div class="doc-entry">' +
          '<span class="doc-entry-flag">' + highlightText(entry.flag, searchQuery) + '</span>' +
          (entry.category ? '<span class="doc-entry-category">' + escapeHtml(entry.category) + '</span>' : '') +
          '<div class="doc-entry-title">' + highlightText(entry.title, searchQuery) + '</div>' +
          '<div class="doc-entry-desc">' + highlightText(desc, searchQuery) + '</div></div>';
      });
    }
    html += '</div>';
  });

  main.innerHTML = html;
  attachCopyHandlers(main);
  // Card expand/collapse handlers for search results
  var srCards = main.querySelectorAll('.card');
  for (var si = 0; si < srCards.length; si++) {
    (function(card) {
      var header = card.querySelector('.card-header');
      if (header) {
        header.addEventListener('click', function() { card.classList.toggle('expanded'); });
      }
    })(srCards[si]);
  }
}

  if (e.key === '/' && !isInput) {

    searchInput.value = '';

    var items = document.querySelectorAll('.nav-item');

    if (idx < items.length) items[idx].click();

function renderHeaderAnalyzer(result) {
  if (!result || !result.headers) return '';
  var headers = result.headers;
  var keys = Object.keys(headers);
  if (keys.length === 0) return '';

  // Build status map from findings
  var statusMap = {};
  (result.findings.enabled || []).forEach(function(f) { statusMap[f.header.toLowerCase()] = 'ok'; });
  (result.findings.insecure || []).forEach(function(f) { statusMap[f.header.toLowerCase()] = 'insecure'; });
  (result.findings.deprecated || []).forEach(function(f) { statusMap[f.header.toLowerCase()] = 'deprecated'; });
  (result.findings.fingerprint || []).forEach(function(f) { statusMap[f.header.toLowerCase()] = 'fingerprint'; });
  (result.findings.empty || []).forEach(function(f) { statusMap[f.header.toLowerCase()] = 'empty'; });

  // Group by category
  var groups = {};
  var groupOrder = [];
  keys.forEach(function(key) {
    var knowledge = HEADER_KNOWLEDGE[key];
    var cat = knowledge ? knowledge.category : 'Other';
    if (!groups[cat]) { groups[cat] = []; groupOrder.push(cat); }
    groups[cat].push(key);
  });

  // Sort: prioritize Security, Caching, Content, CORS, then alphabetical
  var catPriority = ['Security', 'Caching', 'Content', 'CORS', 'Cookies', 'Server', 'CDN', 'Rate Limit', 'Auth', 'Connection', 'Redirect', 'Reporting', 'Info', 'Deprecated', 'Other'];
  groupOrder.sort(function(a, b) {
    var ai = catPriority.indexOf(a); var bi = catPriority.indexOf(b);
    if (ai === -1) ai = 99; if (bi === -1) bi = 99;
    return ai - bi;
  });

  var html = '<div class="header-analyzer">';
  html += '<div class="header-analyzer-title">Header Analyzer</div>';
  html += '<div class="header-analyzer-subtitle">' + keys.length + ' headers received — click any header to see what it means</div>';

  // Category tabs
  html += '<div class="header-analyzer-tabs">';
  html += '<div class="ha-tab active" data-ha-cat="all">All<span class="ha-tab-count">' + keys.length + '</span></div>';
  groupOrder.forEach(function(cat) {
    html += '<div class="ha-tab" data-ha-cat="' + escapeHtml(cat) + '">' + escapeHtml(cat) + '<span class="ha-tab-count">' + groups[cat].length + '</span></div>';
  });
  html += '</div>';

  // Render all cards
  html += '<div class="ha-cards" id="haCards">';
  groupOrder.forEach(function(cat) {
    groups[cat].forEach(function(key) {
      var h = headers[key];
      var name = h.original || key;
      var value = h.value || '';
      var knowledge = HEADER_KNOWLEDGE[key];
      var status = statusMap[key] || '';

      html += '<div class="ha-card" data-ha-cat="' + escapeHtml(knowledge ? knowledge.category : 'Other') + '">';
      html += '<div class="ha-card-header">';
      html += '<span class="ha-card-icon">' + (knowledge ? knowledge.icon : '📋') + '</span>';
      html += '<div class="ha-card-main">';
      html += '<div class="ha-card-name">' + escapeHtml(name) + '</div>';
      html += '<div class="ha-card-summary">' + escapeHtml(knowledge ? knowledge.summary : 'HTTP response header') + '</div>';
      if (value) html += '<div class="ha-card-value">' + escapeHtml(value) + '</div>';
      html += '</div>';
      html += '<div class="ha-card-badges">';
      if (knowledge) html += '<span class="ha-badge ha-badge-category">' + escapeHtml(knowledge.category) + '</span>';
      if (status === 'ok') html += '<span class="ha-badge ha-badge-ok">secure</span>';
      else if (status === 'insecure') html += '<span class="ha-badge ha-badge-danger">insecure</span>';
      else if (status === 'deprecated') html += '<span class="ha-badge ha-badge-depr">deprecated</span>';
      else if (status === 'fingerprint') html += '<span class="ha-badge ha-badge-warn">leaks info</span>';
      else if (status === 'empty') html += '<span class="ha-badge ha-badge-warn">empty</span>';
      html += '</div>';
      html += '<span class="ha-card-chevron">&#9654;</span>';
      html += '</div>'; // .ha-card-header

      // Expandable detail
      html += '<div class="ha-card-detail">';
      if (knowledge && knowledge.explain && value) {
        var explanations = knowledge.explain(value);
        html += '<ul class="ha-detail-list">';
        explanations.forEach(function(line) {
          var isWarning = line.indexOf('\u26A0') >= 0 || line.indexOf('Security tip') >= 0;
          html += '<li' + (isWarning ? ' class="ha-warning"' : '') + '>' + escapeHtml(line) + '</li>';
        });
        html += '</ul>';
      } else if (value) {
        html += '<ul class="ha-detail-list"><li>Value: ' + escapeHtml(value) + '</li></ul>';
      } else {
        html += '<ul class="ha-detail-list"><li class="ha-warning">Header is present but has no value</li></ul>';
      }
      html += '</div>'; // .ha-card-detail
      html += '</div>'; // .ha-card
    });
  });
  html += '</div>'; // .ha-cards
  html += '</div>'; // .header-analyzer
  return html;
}

function attachHeaderAnalyzerHandlers(container) {
  // Tab filtering
  var tabs = container.querySelectorAll('.ha-tab');
  for (var i = 0; i < tabs.length; i++) {
    (function(tab) {
      tab.addEventListener('click', function() {
        var cat = tab.getAttribute('data-ha-cat');
        // Update active tab
        var allTabs = container.querySelectorAll('.ha-tab');
        for (var t = 0; t < allTabs.length; t++) allTabs[t].classList.remove('active');
        tab.classList.add('active');
        // Filter cards
        var cards = container.querySelectorAll('.ha-card');
        for (var c = 0; c < cards.length; c++) {
          if (cat === 'all' || cards[c].getAttribute('data-ha-cat') === cat) {
            cards[c].style.display = '';
          } else {
            cards[c].style.display = 'none';
          }
        }
      });
    })(tabs[i]);
  }

  // Card expand/collapse
  var cardHeaders = container.querySelectorAll('.ha-card-header');
  for (var j = 0; j < cardHeaders.length; j++) {
    (function(header) {
      header.addEventListener('click', function() {
        header.parentElement.classList.toggle('expanded');
      });
    })(cardHeaders[j]);
  }
}

function renderAuditTimeline() {
  var html = '<div class="audit-timeline">';
  html += '<h3 style="color:var(--accent-cyan);font-size:0.9rem;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--card-border);">Saved Audits</h3>';

  var groups = {};
  auditEntries.forEach(function(e) {
    var target = e.target || 'Unknown';
    if (!groups[target]) groups[target] = [];
    groups[target].push(e);
  });

  Object.keys(groups).forEach(function(target) {
    var audits = groups[target];
    audits.sort(function(a, b) { return new Date(a.timestamp) - new Date(b.timestamp); });
    html += '<div class="target-group"><div class="target-group-header">' + escapeHtml(target) + '</div>' +
      '<div class="target-group-entries">';
    audits.forEach(function(audit) {
      var selected = auditSelected.indexOf(audit.id) >= 0;
      var summary = audit.counts.missing + 'M ' + audit.counts.deprecated + 'D ' +
        audit.counts.insecure + 'I ' + audit.counts.fingerprint + 'F';
      html += '<div class="audit-entry' + (selected ? ' selected' : '') + '" data-id="' + escapeHtml(audit.id) + '">' +
        '<div class="audit-entry-select"></div>' +
        '<span class="audit-entry-title">' + escapeHtml(audit.title) + '</span>' +
        '<span class="audit-entry-summary">' + summary + '</span>' +
        '<span class="audit-entry-date">' + formatDate(audit.timestamp) + '</span>' +
        '</div>';
    });
    html += '</div></div>';
  });

  html += '<div style="display:flex;gap:8px;margin-top:14px;align-items:center;">';
  html += '<button class="audit-btn-compare' + (auditSelected.length === 2 ? ' visible' : '') +
    '" id="auditCompareBtn">Compare Selected (' + auditSelected.length + '/2)</button>';
  html += '<button class="audit-btn-clear" id="auditExportBtn">Export JSON</button>';
  html += '</div>';

  html += '</div>';
  return html;
}

function attachAuditHandlers(container) {
  var analyzeBtn = container.querySelector('#auditAnalyzeBtn');
  if (analyzeBtn) {
    analyzeBtn.addEventListener('click', function() {
      var raw = container.querySelector('#auditInput').value.trim();
      if (!raw) return;
      var normalized = normalizeHeaderInput(raw);
      var result = analyzeHeaders(normalized);
      currentAuditResult = {
        rawInput: raw,
        inputType: normalized.meta.source,
        meta: normalized.meta,
        headers: normalized.headers,
        findings: result.findings,
        counts: result.counts
      };
      renderAuditSection(container);
    });
  }

  var clearBtn = container.querySelector('#auditClearBtn');
  if (clearBtn) {
    clearBtn.addEventListener('click', function() {
      currentAuditResult = null;
      renderAuditSection(container);
    });
  }

  var saveBtn = container.querySelector('#auditSaveBtn');
  if (saveBtn) {
    saveBtn.addEventListener('click', function() {
      if (!currentAuditResult) return;
      document.getElementById('auditModalTitle').value = '';
      document.getElementById('auditModalTarget').value = currentAuditResult.meta.target || '';
      document.getElementById('auditSaveModal').classList.add('open');
    });
  }

  var dropZone = container.querySelector('#auditDropZone');
  var fileInput = container.querySelector('#auditFileInput');
  if (dropZone && fileInput) {
    dropZone.addEventListener('click', function() { fileInput.click(); });
    dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
    dropZone.addEventListener('drop', function(e) {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleAuditFileDrop(e.dataTransfer.files, container);
    });
    fileInput.addEventListener('change', function() { handleAuditFileDrop(fileInput.files, container); });
  }

  var sectionHeaders = container.querySelectorAll('.audit-section-header');
  for (var i = 0; i < sectionHeaders.length; i++) {
    (function(header) {
      header.addEventListener('click', function() {
        header.parentElement.classList.toggle('expanded');
      });
    })(sectionHeaders[i]);
  }

  var entries = container.querySelectorAll('.audit-entry');
  for (var j = 0; j < entries.length; j++) {
    (function(entry) {
      entry.addEventListener('click', function() {
        var id = entry.getAttribute('data-id');
        var idx = auditSelected.indexOf(id);
        if (idx >= 0) {
          auditSelected.splice(idx, 1);
          entry.classList.remove('selected');
        } else if (auditSelected.length < 2) {
          auditSelected.push(id);
          entry.classList.add('selected');
        } else {
          // Deselect oldest, select new
          var oldId = auditSelected.shift();
          var oldEntry = container.querySelector('.audit-entry[data-id="' + oldId + '"]');
          if (oldEntry) oldEntry.classList.remove('selected');
          auditSelected.push(id);
          entry.classList.add('selected');
        }
        // Update compare button inline
        var cBtn = container.querySelector('#auditCompareBtn');
        if (cBtn) {
          cBtn.textContent = 'Compare Selected (' + auditSelected.length + '/2)';
          if (auditSelected.length === 2) cBtn.classList.add('visible');
          else cBtn.classList.remove('visible');
        }
      });
    })(entries[j]);
  }

  var compareBtn = container.querySelector('#auditCompareBtn');
  if (compareBtn) {
    compareBtn.addEventListener('click', function() {
      if (auditSelected.length === 2) {
        auditComparing = true;
        renderAuditSection(container);
      }
    });
  }

  var exportBtn = container.querySelector('#auditExportBtn');
  if (exportBtn) {
    exportBtn.addEventListener('click', function() { exportAuditEntries(); });
  }

  var compBack = container.querySelector('.comparison-back');
  if (compBack) {
    compBack.addEventListener('click', function() {
      auditComparing = false;
      renderAuditSection(container);
    });
  }

  attachCopyHandlers(container);
}

function handleAuditFileDrop(files, container) {
  var fileArray = Array.prototype.slice.call(files);
  fileArray.forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var content = e.target.result;
      try {
        var data = JSON.parse(content);
        if (data.auditEntries && Array.isArray(data.auditEntries)) {
          data.auditEntries.forEach(function(entry) {
            var exists = auditEntries.some(function(ex) { return ex.id === entry.id; });
            if (!exists) auditEntries.push(entry);
          });
          renderAuditSection(container);
          return;
        }
      } catch(err) { /* not JSON, treat as header text */ }
      var textarea = container.querySelector('#auditInput');
      if (textarea) {
        textarea.value = content;
      }
    };
    reader.readAsText(file);
  });
}

function renderAuditComparisonView() {
  var older = null;
  var newer = null;
  auditEntries.forEach(function(e) {
    if (e.id === auditSelected[0]) older = e;
    if (e.id === auditSelected[1]) newer = e;
  });
  if (!older || !newer) return renderEmptyState('Could not find selected audits');

  if (new Date(older.timestamp) > new Date(newer.timestamp)) {
    var tmp = older; older = newer; newer = tmp;
  }

  // Collect all changes across categories into a flat list
  var changes = [];
  var catDefs = [
    { key: 'missing', label: 'Missing', keyFn: function(i) { return i.header.toLowerCase(); }, descFn: function(i) { return i.description || ''; } },
    { key: 'deprecated', label: 'Deprecated', keyFn: function(i) { return i.header.toLowerCase(); }, descFn: function(i) { return i.reason || ''; } },
    { key: 'insecure', label: 'Insecure', keyFn: function(i) { return i.header.toLowerCase() + ':' + i.issue; }, descFn: function(i) { return i.issue || ''; } },
    { key: 'fingerprint', label: 'Fingerprint', keyFn: function(i) { return i.header.toLowerCase(); }, descFn: function(i) { return i.technology || ''; } }
  ];

  catDefs.forEach(function(cat) {
    var oldItems = older.findings[cat.key] || [];
    var newItems = newer.findings[cat.key] || [];
    var oldMap = {};
    var newMap = {};
    oldItems.forEach(function(i) { oldMap[cat.keyFn(i)] = i; });
    newItems.forEach(function(i) { newMap[cat.keyFn(i)] = i; });
    var allKeys = {};
    Object.keys(oldMap).forEach(function(k) { allKeys[k] = true; });
    Object.keys(newMap).forEach(function(k) { allKeys[k] = true; });
    Object.keys(allKeys).forEach(function(k) {
      var inOld = !!oldMap[k];
      var inNew = !!newMap[k];
      var item = newMap[k] || oldMap[k];
      var status;
      if (inOld && !inNew) status = 'fixed';
      else if (!inOld && inNew) status = 'new';
      else status = 'same';
      changes.push({ header: item.header, category: cat.label, detail: cat.descFn(item), status: status });
    });
  });

  // Sort: fixed first, then new, then same
  var order = { fixed: 0, 'new': 1, same: 2 };
  changes.sort(function(a, b) { return (order[a.status] || 2) - (order[b.status] || 2); });

  var fixedCount = changes.filter(function(c) { return c.status === 'fixed'; }).length;
  var newCount = changes.filter(function(c) { return c.status === 'new'; }).length;
  var sameCount = changes.filter(function(c) { return c.status === 'same'; }).length;
  var olderTotal = older.counts.missing + older.counts.deprecated + older.counts.insecure + older.counts.fingerprint;
  var newerTotal = newer.counts.missing + newer.counts.deprecated + newer.counts.insecure + newer.counts.fingerprint;

  var html = '<div class="comparison-back">&larr; Back to Audit</div>';

  // Header cards
  html += '<div class="audit-comp-header">' +
    '<div class="audit-comp-card">' +
      '<div class="audit-comp-label">OLDER</div>' +
      '<div class="audit-comp-title">' + escapeHtml(older.title) + '</div>' +
      '<div class="audit-comp-meta">' + formatDate(older.timestamp) + ' &middot; ' + olderTotal + ' issues</div>' +
    '</div>' +
    '<div class="audit-comp-arrow">&rarr;</div>' +
    '<div class="audit-comp-card">' +
      '<div class="audit-comp-label">NEWER</div>' +
      '<div class="audit-comp-title">' + escapeHtml(newer.title) + '</div>' +
      '<div class="audit-comp-meta">' + formatDate(newer.timestamp) + ' &middot; ' + newerTotal + ' issues</div>' +
    '</div>' +
  '</div>';

  // Summary badges
  html += '<div class="audit-comp-summary">';
  if (fixedCount > 0) html += '<span class="audit-comp-badge fixed">' + fixedCount + ' fixed</span>';
  if (newCount > 0) html += '<span class="audit-comp-badge new-issue">' + newCount + ' new</span>';
  if (sameCount > 0) html += '<span class="audit-comp-badge same">' + sameCount + ' unchanged</span>';
  if (newerTotal < olderTotal) {
    html += '<span class="audit-comp-badge improved">Improved (' + olderTotal + ' &rarr; ' + newerTotal + ')</span>';
  } else if (newerTotal > olderTotal) {
    html += '<span class="audit-comp-badge regressed">Regressed (' + olderTotal + ' &rarr; ' + newerTotal + ')</span>';
  } else {
    html += '<span class="audit-comp-badge same">No change (' + newerTotal + ' issues)</span>';
  }
  html += '</div>';

  // Changes list
  if (changes.length === 0) {
    html += '<div style="color:var(--text-muted);font-size:0.85rem;text-align:center;padding:30px 0;">No findings in either audit to compare.</div>';
  } else {
    html += '<div class="audit-comp-list">';
    var lastStatus = '';
    changes.forEach(function(c) {
      if (c.status !== lastStatus) {
        var groupLabel = c.status === 'fixed' ? 'Fixed' : c.status === 'new' ? 'New Issues' : 'Unchanged';
        html += '<div class="audit-comp-group-label ' + c.status + '">' + groupLabel + '</div>';
        lastStatus = c.status;
      }
      var icon = c.status === 'fixed' ? '&#10003;' : c.status === 'new' ? '&#10007;' : '&#8212;';
      html += '<div class="audit-comp-item ' + c.status + '">' +
        '<span class="audit-comp-icon">' + icon + '</span>' +
        '<span class="audit-comp-item-header">' + escapeHtml(c.header) + '</span>' +
        '<span class="audit-comp-item-cat">' + escapeHtml(c.category) + '</span>' +
        (c.detail ? '<span class="audit-comp-item-detail">' + escapeHtml(c.detail) + '</span>' : '') +
      '</div>';
    });
    html += '</div>';
  }

  return html;
}

function init() {
  initTheme();
  buildSidebar();

  var refSections = [];
  commands.forEach(function(c) {
    if (refSections.indexOf(c.section) === -1) refSections.push(c.section);
  });

  if (refSections.length > 0) {
    navigateTo({ type: 'reference', key: refSections[0] });
  } else if (Object.keys(craftTools).length > 0) {
    navigateTo({ type: 'craft', key: Object.keys(craftTools)[0] });
  } else {
    document.getElementById('mainContent').innerHTML = renderEmptyState(
      'Welcome to ScanRef',
      'Add commands, craft tools, or docs to get started'
    );
  }
}

init();
</script>
